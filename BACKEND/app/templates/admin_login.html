<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - NekwasaR</title>
    <link rel="stylesheet" href="/static/css/global.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 2rem;
            background: var(--base);
            border: 1px solid var(--stroke-elements);
            border-radius: var(--_radius-xl);
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .form-group input {
            padding: 0.75rem;
            border: 1px solid var(--stroke-elements);
            border-radius: var(--_radius-m);
            background: var(--base-tint);
            color: var(--t-bright);
        }

        .login-btn {
            padding: 0.75rem;
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            color: var(--t-opp-bright);
            border: none;
            border-radius: var(--_radius-m);
            cursor: pointer;
            font-weight: 700;
            margin-top: 1rem;
        }

        .error-message {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
            padding: 0.5rem;
            border-radius: var(--_radius-s);
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <h2 style="text-align: center; margin-bottom: 2rem;">Admin Login</h2>
        <form class="login-form" id="loginForm">
            <div id="credentialsSection">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="login-btn">Login</button>
            </div>

            <div id="mfaSection" style="display: none;">
                <p style="font-size: 0.9rem; color: var(--t-medium); margin-bottom: 1rem;">
                    Please enter the 6-digit code from your authenticator app.
                </p>
                <div class="form-group">
                    <label for="mfaCode">MFA Code</label>
                    <input type="text" id="mfaCode" name="mfaCode" pattern="[0-9]*" inputmode="numeric" maxlength="6">
                </div>
                <button type="button" id="mfaBtn" class="login-btn">Verify & Continue</button>
                <button type="button" id="backBtn"
                    style="background: transparent; color: var(--t-medium); border: 1px solid var(--stroke-elements); margin-top: 0.5rem;"
                    class="login-btn">Back</button>
            </div>
        </form>
        <div id="errorMessage" class="error-message"></div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');

        let pendingMfaToken = null;

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    if (data.mfa_required) {
                        pendingMfaToken = data.mfa_token;
                        document.getElementById('credentialsSection').style.display = 'none';
                        document.getElementById('mfaSection').style.display = 'block';
                        showError('MFA required. Check your app.', 'success');
                    } else {
                        handleLoginSuccess(data);
                    }
                } else {
                    showError(data.detail || 'Login failed');
                }
            } catch (error) {
                showError('Network error. Please try again.');
            }
        });

        document.getElementById('mfaBtn').addEventListener('click', async () => {
            const code = document.getElementById('mfaCode').value;
            if (!code || code.length < 6) {
                showError('Enter 6-digit code');
                return;
            }

            try {
                const response = await fetch('/api/auth/verify-mfa', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${pendingMfaToken}`
                    },
                    body: JSON.stringify({ code })
                });

                const data = await response.json();
                if (response.ok) {
                    handleLoginSuccess(data);
                } else {
                    showError(data.detail || 'MFA failed');
                }
            } catch (error) {
                showError('MFA connection error');
            }
        });

        document.getElementById('backBtn').addEventListener('click', () => {
            document.getElementById('credentialsSection').style.display = 'block';
            document.getElementById('mfaSection').style.display = 'none';
            pendingMfaToken = null;
        });

        function handleLoginSuccess(data) {
            if (data.access_token) {
                localStorage.setItem('token', data.access_token);
            }
            showError('Login successful! Redirecting...', 'success');
            setTimeout(() => {
                window.location.href = '/admin/dashboard';
            }, 1000);
        }

        function showError(message, type = 'error') {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            errorMessage.style.background = type === 'success' ? 'rgba(75, 181, 67, 0.1)' : 'rgba(255, 107, 107, 0.1)';
            errorMessage.style.color = type === 'success' ? '#4bb543' : '#ff6b6b';
            setTimeout(() => {
                errorMessage.style.display = 'none';
            }, 5000);
        }

        async function loadDashboardWithToken(token) {
            console.log('🖥️ LOADING DASHBOARD - Redirecting to dashboard URL');

            try {
                // Store token first
                localStorage.setItem('token', token);
                console.log('💾 TOKEN STORED BEFORE REDIRECT');

                // Redirect to dashboard URL instead of loading HTML
                console.log('🔄 REDIRECTING TO: /admin/dashboard');
                window.location.href = '/admin/dashboard';

                console.log('🎉 REDIRECT INITIATED');
            } catch (error) {
                console.error('💥 DASHBOARD REDIRECT ERROR:', error);
                console.error('💥 ERROR MESSAGE:', error.message);
                showError('Failed to load dashboard. Please try again.');
            }
        }
    </script>
</body>

</html>

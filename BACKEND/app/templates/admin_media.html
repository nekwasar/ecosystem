<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Manager | NekwasaR Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        'syne': ['Syne', 'sans-serif'],
                        'inter': ['Inter', 'sans-serif'],
                    },
                    colors: {
                        'base': '#0f172a',
                        'base-tint': '#1e293b',
                        'accent': '#6366f1',
                        'stroke': '#334155',
                        't-bright': '#f8fafc',
                        't-muted': '#94a3b8'
                    }
                }
            }
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }

        .drag-active {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.1);
        }
    </style>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body class="bg-base text-t-bright font-inter antialiased min-h-screen">

    <!-- Main Container -->
    <div class="p-6 md:p-10 max-w-7xl mx-auto">

        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold font-syne mb-1">Media Library</h1>
                <p class="text-t-muted text-sm">Manage assets, generate CDN links, and share files.</p>
            </div>
            <button onclick="openUploadModal()"
                class="px-6 py-3 bg-accent hover:bg-indigo-500 text-white font-bold rounded-xl shadow-lg hover:shadow-accent/20 transition-all flex items-center gap-2">
                <i class="ph-bold ph-upload-simple"></i>
                <span>Upload Asset</span>
            </button>
        </div>

        <!-- Toolbar -->
        <div class="flex flex-wrap gap-4 mb-8 items-center bg-base-tint p-2 rounded-xl border border-stroke">
            <div class="flex gap-2">
                <button onclick="filterType('all')"
                    class="filter-btn active px-4 py-2 rounded-lg text-sm font-medium transition-colors bg-accent text-white"
                    data-type="all">All</button>
                <button onclick="filterType('image')"
                    class="filter-btn px-4 py-2 rounded-lg text-sm font-medium transition-colors hover:bg-white/5 text-t-muted"
                    data-type="image">Images</button>
                <button onclick="filterType('video')"
                    class="filter-btn px-4 py-2 rounded-lg text-sm font-medium transition-colors hover:bg-white/5 text-t-muted"
                    data-type="video">Videos</button>
            </div>
            <div class="ml-auto w-full md:w-auto relative">
                <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-t-muted"></i>
                <input type="text" id="searchInput" oninput="handleSearch(this.value)" placeholder="Search files..."
                    class="w-full md:w-64 pl-10 pr-4 py-2 bg-base border border-stroke rounded-lg focus:border-accent outline-none text-sm transition-colors">
            </div>
        </div>

        <!-- Grid -->
        <div id="mediaGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
            <!-- Items injected here -->
            <div class="col-span-full py-20 text-center text-t-muted animate-pulse">Loading assets...</div>
        </div>

    </div>

    <!-- Upload Modal -->
    <div id="uploadModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm transition-opacity" onclick="closeUploadModal()">
        </div>

        <div
            class="relative bg-base-tint border border-stroke rounded-2xl w-full max-w-lg shadow-2xl transform transition-all scale-100 p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold font-syne">Upload Asset</h3>
                <button onclick="closeUploadModal()" class="text-t-muted hover:text-white"><i
                        class="ph-bold ph-x text-xl"></i></button>
            </div>

            <form id="uploadForm" onsubmit="handleUpload(event)">

                <!-- Drop Zone -->
                <div id="dropZone"
                    class="border-2 border-dashed border-stroke rounded-xl p-8 text-center cursor-pointer hover:border-accent transition-colors mb-6 group relative overflow-hidden">
                    <input type="file" id="fileInput" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                        onchange="handleFileSelect(this)" required>
                    <div id="dropContent" class="pointer-events-none">
                        <i
                            class="ph-duotone ph-cloud-arrow-up text-4xl text-t-muted mb-2 group-hover:text-accent transition-colors"></i>
                        <p class="text-sm text-t-bright font-medium">Click to upload or drag & drop</p>
                        <p class="text-xs text-t-muted mt-1">Images, Videos, Documents (Max 100MB)</p>
                    </div>
                    <div id="filePreview" class="hidden flex-col items-center pointer-events-none">
                        <div
                            class="w-16 h-16 bg-base rounded-lg flex items-center justify-center mb-2 border border-stroke">
                            <i class="ph-fill ph-file text-2xl text-accent"></i>
                        </div>
                        <p id="selectedFileName" class="text-sm font-bold truncate max-w-[200px]"></p>
                        <p id="selectedFileSize" class="text-xs text-t-muted"></p>
                    </div>
                </div>

                <!-- Settings -->
                <div class="space-y-4 mb-6">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-t-muted mb-1">Custom Slug
                            (Optional)</label>
                        <div class="relative">
                            <input type="text" name="slug" id="slugInput" placeholder="e.g. my-awesome-file"
                                class="w-full px-4 py-2 bg-base border border-stroke rounded-lg focus:border-accent outline-none text-sm">
                            <span id="slugHint" class="absolute right-3 top-2.5 text-xs text-t-muted">Auto-generated if
                                empty</span>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-t-muted mb-2">Delivery
                            Method</label>
                        <div class="grid grid-cols-2 gap-3">
                            <label class="cursor-pointer">
                                <input type="radio" name="route_type" value="SHARE" class="peer sr-only" checked
                                    onchange="updateUrlPreview()">
                                <div
                                    class="p-3 border border-stroke rounded-xl peer-checked:border-accent peer-checked:bg-accent/10 transition-all text-center">
                                    <i class="ph-bold ph-share-network text-xl mb-1 block"></i>
                                    <span class="text-sm font-bold">Share Link</span>
                                </div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="route_type" value="CDN" class="peer sr-only"
                                    onchange="updateUrlPreview()">
                                <div
                                    class="p-3 border border-stroke rounded-xl peer-checked:border-accent peer-checked:bg-accent/10 transition-all text-center">
                                    <i class="ph-bold ph-globe text-xl mb-1 block"></i>
                                    <span class="text-sm font-bold">CDN Asset</span>
                                </div>
                            </label>
                        </div>
                        <p id="urlPreview"
                            class="mt-2 text-xs text-t-muted font-mono bg-base p-2 rounded border border-stroke text-center">
                            nekwasar.com/share/...
                        </p>
                    </div>
                </div>

                <button type="submit" id="uploadBtn"
                    class="w-full py-3 bg-accent hover:bg-indigo-500 text-white font-bold rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                    <span id="uploadText">Upload Asset</span>
                    <i id="uploadSpinner" class="ph-bold ph-spinner animate-spin hidden"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast"
        class="fixed bottom-5 right-5 z-[60] bg-base-tint border border-accent text-white px-6 py-4 rounded-xl shadow-2xl translate-y-20 opacity-0 transition-all duration-300 flex items-center gap-3">
        <i class="ph-fill ph-check-circle text-green-400 text-xl"></i>
        <div class="flex flex-col">
            <span class="font-bold text-sm" id="toastTitle">Success</span>
            <span class="text-xs text-t-muted" id="toastMessage">Action completed</span>
        </div>
    </div>

    <script>
        let ASSETS = [];

        // --- Init ---
        document.addEventListener('DOMContentLoaded', () => {
            loadAssets();
            setupDragDrop();
        });

        async function loadAssets() {
            try {
                const res = await fetch('/api/admin/media?limit=100');
                ASSETS = await res.json();
                renderAssets(ASSETS);
            } catch (e) {
                console.error("Failed to load assets", e);
            }
        }

        function renderAssets(list) {
            const grid = document.getElementById('mediaGrid');
            if (list.length === 0) {
                grid.innerHTML = '<div class="col-span-full py-20 text-center text-t-muted flex flex-col items-center gap-4"><i class="ph-duotone ph-folder-open text-4xl"></i><span>No assets found.</span></div>';
                return;
            }

            grid.innerHTML = list.map(asset => {
                const isImage = asset.mime_type.startsWith('image/');
                const icon = isImage ? 'ph-image' : (asset.mime_type.startsWith('video/') ? 'ph-film-strip' : 'ph-file-text');
                const preview = isImage
                    ? `<img src="${asset.file_url}" class="w-full h-full object-cover transition-transform group-hover:scale-110" loading="lazy">`
                    : `<div class="w-full h-full bg-base flex items-center justify-center"><i class="ph-duotone ${icon} text-4xl text-t-muted group-hover:text-accent transition-colors"></i></div>`;

                const badge = asset.route_type === 'CDN'
                    ? `<span class="absolute top-2 left-2 px-2 py-0.5 bg-purple-500/20 text-purple-400 border border-purple-500/30 text-[10px] font-bold rounded uppercase backdrop-blur-md">CDN</span>`
                    : `<span class="absolute top-2 left-2 px-2 py-0.5 bg-blue-500/20 text-blue-400 border border-blue-500/30 text-[10px] font-bold rounded uppercase backdrop-blur-md">SHARE</span>`;

                return `
            <div class="group relative bg-base-tint border border-stroke rounded-xl overflow-hidden hover:border-accent/50 transition-all hover:shadow-xl">
                <!-- Preview -->
                <div class="aspect-square relative overflow-hidden bg-base">
                    ${preview}
                    ${badge}
                    <!-- Overlay Actions -->
                    <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-2 backdrop-blur-[2px]">
                         <button onclick="copyLink('${asset.file_url}')" class="p-2 bg-white/10 hover:bg-white/20 rounded-lg text-white backdrop-blur-md" title="Copy Link">
                            <i class="ph-bold ph-link"></i>
                         </button>
                         <button onclick="copyLink('${getDownloadLink(asset)}')" class="p-2 bg-white/10 hover:bg-white/20 rounded-lg text-white backdrop-blur-md" title="Copy Download Link">
                            <i class="ph-bold ph-download-simple"></i>
                         </button>
                         <button onclick="deleteAsset(${asset.id})" class="p-2 bg-red-500/20 hover:bg-red-500/40 text-red-500 border border-red-500/30 rounded-lg backdrop-blur-md" title="Delete">
                            <i class="ph-bold ph-trash"></i>
                         </button>
                    </div>
                </div>
                <!-- Info -->
                <div class="p-3">
                    <div class="flex justify-between items-start mb-1">
                        <div class="font-bold text-sm truncate pr-2 w-full" title="${asset.filename}">${asset.slug}</div>
                    </div>
                    <div class="flex justify-between text-xs text-t-muted">
                        <span class="uppercase">${asset.mime_type.split('/')[1] || 'FILE'}</span>
                        <span>${formatBytes(asset.size)}</span>
                    </div>
                </div>
            </div>
            `;
            }).join('');
        }

        // --- Helpers ---
        function getDownloadLink(asset) {
            if (asset.route_type === 'CDN') {
                return asset.file_url.replace(asset.slug, `d_${asset.slug}`);
            } else {
                return asset.file_url.replace('/share/', '/d/');
            }
        }

        function formatBytes(bytes, decimals = 2) {
            if (!+bytes) return '0 B';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
        }

        function filterType(type) {
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.type === type);
                b.classList.toggle('bg-accent', b.dataset.type === type);
                b.classList.toggle('text-white', b.dataset.type === type);
                b.classList.toggle('text-t-muted', b.dataset.type !== type);
            });

            if (type === 'all') {
                renderAssets(ASSETS);
            } else {
                renderAssets(ASSETS.filter(a => a.mime_type.includes(type)));
            }
        }

        function handleSearch(query) {
            if (!query) return renderAssets(ASSETS);
            const term = query.toLowerCase();
            renderAssets(ASSETS.filter(a =>
                a.slug.toLowerCase().includes(term) ||
                a.original_name.toLowerCase().includes(term)
            ));
        }

        // --- Upload Logic ---
        function openUploadModal() {
            document.getElementById('uploadModal').classList.remove('hidden');
            document.getElementById('uploadForm').reset();
            resetDropZone();
            updateUrlPreview();
        }
        function closeUploadModal() {
            document.getElementById('uploadModal').classList.add('hidden');
        }

        function handleFileSelect(input) {
            const file = input.files[0];
            if (!file) return;

            // Show Preview
            document.getElementById('dropContent').classList.add('hidden');
            document.getElementById('filePreview').classList.remove('hidden');
            document.getElementById('filePreview').classList.add('flex');

            document.getElementById('selectedFileName').innerText = file.name;
            document.getElementById('selectedFileSize').innerText = formatBytes(file.size);

            // Auto-fill slug if empty
            const slugInput = document.getElementById('slugInput');
            if (!slugInput.value) {
                const safeName = file.name.split('.')[0].toLowerCase().replace(/[^a-z0-9]/g, '-');
                slugInput.value = safeName;
                updateUrlPreview();
            }
        }

        function resetDropZone() {
            document.getElementById('dropContent').classList.remove('hidden');
            document.getElementById('filePreview').classList.add('hidden');
            document.getElementById('filePreview').classList.remove('flex');
            document.getElementById('fileInput').value = '';
        }

        function updateUrlPreview() {
            const slug = document.getElementById('slugInput').value || '...';
            const type = document.querySelector('input[name="route_type"]:checked').value;
            const el = document.getElementById('urlPreview');

            if (type === 'CDN') {
                el.innerText = `https://cdn.nekwasar.com/${slug}`;
            } else {
                el.innerText = `nekwasar.com/share/${slug}`;
            }
        }

        // Add event listener to slug input to update preview live
        document.getElementById('slugInput').addEventListener('input', updateUrlPreview);

        async function handleUpload(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const btn = document.getElementById('uploadBtn');
            const spinner = document.getElementById('uploadSpinner');
            const text = document.getElementById('uploadText');

            // Loading State
            btn.disabled = true;
            spinner.classList.remove('hidden');
            text.innerText = 'Uploading...';

            try {
                const res = await fetch('/api/admin/media/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                if (!res.ok) throw new Error(data.detail || 'Upload failed');

                showToast('Success', 'File uploaded successfully');
                closeUploadModal();
                loadAssets(); // Refresh grid

            } catch (e) {
                showToast('Error', e.message, true);
            } finally {
                btn.disabled = false;
                spinner.classList.add('hidden');
                text.innerText = 'Upload Asset';
            }
        }

        // --- Actions ---
        function copyLink(url) {
            // If relative URL, make absolute
            const fullUrl = url.startsWith('http') ? url : window.location.origin + url;
            navigator.clipboard.writeText(fullUrl).then(() => {
                showToast('Copied', 'Link copied to clipboard');
            });
        }

        async function deleteAsset(id) {
            if (!confirm('Are you sure? This cannot be undone.')) return;
            try {
                const res = await fetch(`/api/admin/media/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    showToast('Deleted', 'Asset removed');
                    loadAssets();
                } else {
                    throw new Error('Delete failed');
                }
            } catch (e) {
                showToast('Error', e.message, true);
            }
        }

        function showToast(title, message, isError = false) {
            const t = document.getElementById('toast');
            document.getElementById('toastTitle').innerText = title;
            document.getElementById('toastMessage').innerText = message;

            if (isError) {
                t.querySelector('i').classList.replace('ph-check-circle', 'ph-warning-circle');
                t.querySelector('i').classList.replace('text-green-400', 'text-red-400');
            } else {
                t.querySelector('i').classList.replace('ph-warning-circle', 'ph-check-circle');
                t.querySelector('i').classList.replace('text-red-400', 'text-green-400');
            }

            t.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                t.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        function setupDragDrop() {
            const dropZone = document.getElementById('dropZone');

            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, preventDefaults, false);
            });

            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }

            ['dragenter', 'dragover'].forEach(eventName => {
                dropZone.addEventListener(eventName, highlight, false);
            });

            ['dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, unhighlight, false);
            });

            function highlight(e) {
                dropZone.classList.add('drag-active');
            }

            function unhighlight(e) {
                dropZone.classList.remove('drag-active');
            }

            dropZone.addEventListener('drop', handleDrop, false);

            function handleDrop(e) {
                const dt = e.dataTransfer;
                const files = dt.files;
                document.getElementById('fileInput').files = files;
                handleFileSelect(document.getElementById('fileInput'));
            }
        }
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script>
        // Check for dark mode preference
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
    <style>
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .dark ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
    </style>
</head>

<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white antialiased transition-colors duration-200">
    <div class="min-h-screen p-6">
        <!-- Header -->
        <div class="mb-8 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-1">Analytics</h1>
                <p class="text-gray-600 dark:text-gray-400">Performance insights for your campaigns</p>
            </div>
            <!-- Export controls if needed -->
        </div>

        <!-- KPI Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div
                class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 flex flex-col justify-between h-32">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-sm font-medium text-gray-500 dark:text-gray-400">Total Emails Sent</p>
                        <h3 class="text-2xl font-bold text-gray-900 dark:text-white mt-1" id="totalSent">0</h3>
                    </div>
                    <div class="p-2 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-lg">
                        <i class="ph-bold ph-paper-plane-tilt text-xl"></i>
                    </div>
                </div>
            </div>

            <div
                class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 flex flex-col justify-between h-32">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-sm font-medium text-gray-500 dark:text-gray-400">Avg. Open Rate</p>
                        <h3 class="text-2xl font-bold text-gray-900 dark:text-white mt-1" id="avgOpenRate">0%</h3>
                    </div>
                    <div class="p-2 bg-green-50 dark:bg-green-900/30 text-green-600 dark:text-green-400 rounded-lg">
                        <i class="ph-bold ph-envelope-open text-xl"></i>
                    </div>
                </div>
            </div>

            <div
                class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 flex flex-col justify-between h-32">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-sm font-medium text-gray-500 dark:text-gray-400">Avg. Click Rate</p>
                        <h3 class="text-2xl font-bold text-gray-900 dark:text-white mt-1" id="avgClickRate">0%</h3>
                    </div>
                    <div class="p-2 bg-purple-50 dark:bg-purple-900/30 text-purple-600 dark:text-purple-400 rounded-lg">
                        <i class="ph-bold ph-cursor-click text-xl"></i>
                    </div>
                </div>
            </div>

            <div
                class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 flex flex-col justify-between h-32">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-sm font-medium text-gray-500 dark:text-gray-400">Total Clicks</p>
                        <h3 class="text-2xl font-bold text-gray-900 dark:text-white mt-1" id="totalClicks">0</h3>
                    </div>
                    <div class="p-2 bg-orange-50 dark:bg-orange-900/30 text-orange-600 dark:text-orange-400 rounded-lg">
                        <i class="ph-bold ph-mouse-left-click text-xl"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Campaign Performance Table -->
        <div
            class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden">
            <div class="p-6 border-b border-gray-100 dark:border-gray-700 flex justify-between items-center">
                <h3 class="text-lg font-bold text-gray-900 dark:text-white">Campaign Performance</h3>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50/50 dark:bg-gray-700/50 border-b border-gray-200 dark:border-gray-700">
                        <tr>
                            <th
                                class="px-6 py-4 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                                Campaign</th>
                            <th
                                class="px-6 py-4 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                                Status</th>
                            <th
                                class="px-6 py-4 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                                Sent</th>
                            <th
                                class="px-6 py-4 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                                Opens</th>
                            <th
                                class="px-6 py-4 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                                Clicks</th>
                            <th
                                class="px-6 py-4 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                                Date</th>
                        </tr>
                    </thead>
                    <tbody id="campaignTableBody" class="divide-y divide-gray-100 dark:divide-gray-700">
                        <tr>
                            <td colspan="6" class="px-6 py-10 text-center text-gray-500 dark:text-gray-400">
                                <i
                                    class="ph-duotone ph-spinner-gap animate-spin text-2xl mb-2 text-blue-600 dark:text-blue-400"></i>
                                <p>Loading data...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', init);

        async function init() {
            try {
                const res = await fetch('/api/newsletter/admin/campaigns');
                const data = await res.json();
                if (data.campaigns) {
                    processData(data.campaigns);
                }
            } catch (e) {
                console.error(e);
                document.getElementById('campaignTableBody').innerHTML = `<tr><td colspan="6" class="px-6 py-8 text-center text-red-500 dark:text-red-400">Failed to load data</td></tr>`;
            }
        }

        function processData(campaigns) {
            const tbody = document.getElementById('campaignTableBody');
            tbody.innerHTML = '';

            if (campaigns.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-8 text-center text-gray-400 dark:text-gray-500">No campaigns found</td></tr>`;
                return;
            }

            let totalSent = 0;
            let totalOpens = 0;
            let totalClicks = 0;
            let countWithRecipients = 0;

            // Sort by date desc
            campaigns.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            campaigns.forEach(c => {
                const sent = c.recipient_count || 0;
                const opens = c.open_count || 0;
                const clicks = c.click_count || 0;
                const status = c.status || 'draft';

                if (sent > 0) {
                    totalSent += sent;
                    totalOpens += opens;
                    totalClicks += clicks;
                    countWithRecipients++;
                }

                const openRate = sent > 0 ? ((opens / sent) * 100).toFixed(1) : '0.0';
                const clickRate = sent > 0 ? ((clicks / sent) * 100).toFixed(1) : '0.0';
                const date = c.created_at ? new Date(c.created_at).toLocaleDateString() : '-';

                // Render row
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="font-medium text-gray-900 dark:text-white block mb-0.5">${c.subject || '(No Subject)'}</span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2.5 py-1 inline-flex text-xs leading-5 font-medium rounded-full ${getStatusColor(status)}">
                                ${status.toUpperCase()}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600 dark:text-gray-300">${sent.toLocaleString()}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600 dark:text-gray-300">
                            <div class="font-medium text-gray-900 dark:text-white">${openRate}%</div>
                            <div class="text-xs text-gray-400 dark:text-gray-500">${opens} opens</div>
                        </td>
                         <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600 dark:text-gray-300">
                            <div class="font-medium text-gray-900 dark:text-white">${clickRate}%</div>
                            <div class="text-xs text-gray-400 dark:text-gray-500">${clicks} clicks</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400">${date}</td>
                    </tr>
                `;
            });

            // Update KPI Cards
            document.getElementById('totalSent').innerText = totalSent.toLocaleString();
            document.getElementById('totalClicks').innerText = totalClicks.toLocaleString();

            const avgOpenRate = totalSent > 0 ? ((totalOpens / totalSent) * 100).toFixed(1) : '0.0';
            const avgClickRate = totalSent > 0 ? ((totalClicks / totalSent) * 100).toFixed(1) : '0.0';

            document.getElementById('avgOpenRate').innerText = avgOpenRate + '%';
            document.getElementById('avgClickRate').innerText = avgClickRate + '%';
        }

        function getStatusColor(status) {
            // Colors optimized for both light and dark modes
            switch (status.toLowerCase()) {
                case 'sent': return 'bg-green-100 dark:bg-green-900/40 text-green-700 dark:text-green-300 border border-green-200 dark:border-green-800';
                case 'draft': return 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-gray-600';
                case 'failed': return 'bg-red-100 dark:bg-red-900/40 text-red-700 dark:text-red-300 border border-red-200 dark:border-red-800';
                default: return 'bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300 border border-blue-200 dark:border-blue-800';
            }
        }
    </script>
</body>

</html>

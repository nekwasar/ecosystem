<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter Segments</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script>
        // Check for dark mode preference
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
    <style>
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .dark ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
    </style>
</head>

<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white antialiased transition-colors duration-200">
    <div class="min-h-screen p-6">
        <!-- Header -->
        <div class="mb-8 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-2">Segments</h1>
                <p class="text-gray-600 dark:text-gray-400">Advanced audience segmentation and targeting</p>
            </div>
            <div class="flex gap-4">
                <button id="importSegmentBtn"
                    class="bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 border border-gray-300 dark:border-gray-600 px-5 py-2.5 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition-all">
                    <i class="ph-bold ph-download mr-2"></i> Import
                </button>
                <button id="createSegmentBtn"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg flex items-center gap-2 font-medium transition-colors shadow-sm">
                    <i class="ph-bold ph-plus"></i> Create Segment
                </button>
            </div>
        </div>

        <!-- Segment Stats -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-100 dark:border-gray-700 p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 dark:text-gray-400 text-sm">Total Segments</p>
                        <p class="text-2xl font-bold text-gray-900 dark:text-white" id="totalSegments">18</p>
                    </div>
                    <div class="p-3 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-lg">
                        <i class="ph-bold ph-users text-2xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-100 dark:border-gray-700 p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 dark:text-gray-400 text-sm">Active Segments</p>
                        <p class="text-2xl font-bold text-gray-900 dark:text-white" id="activeSegments">12</p>
                    </div>
                    <div class="p-3 bg-green-50 dark:bg-green-900/30 text-green-600 dark:text-green-400 rounded-lg">
                        <i class="ph-bold ph-check-circle text-2xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-100 dark:border-gray-700 p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 dark:text-gray-400 text-sm">Avg. Segment Size</p>
                        <p class="text-2xl font-bold text-gray-900 dark:text-white" id="avgSegmentSize">456</p>
                    </div>
                    <div class="p-3 bg-purple-50 dark:bg-purple-900/30 text-purple-600 dark:text-purple-400 rounded-lg">
                        <i class="ph-bold ph-chart-pie text-2xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-100 dark:border-gray-700 p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 dark:text-gray-400 text-sm">Open Rate Boost</p>
                        <p class="text-2xl font-bold text-gray-900 dark:text-white" id="openRateBoost">+34%</p>
                    </div>
                    <div class="p-3 bg-orange-50 dark:bg-orange-900/30 text-orange-600 dark:text-orange-400 rounded-lg">
                        <i class="ph-bold ph-rocket text-2xl"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Active Segments Table -->
        <div
            class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden">
            <div
                class="p-6 border-b border-gray-100 dark:border-gray-700 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <h3 class="text-lg font-bold text-gray-900 dark:text-white">Active Segments</h3>
                <div class="flex gap-4">
                    <div class="relative">
                        <input type="text" id="segmentSearch" placeholder="Search"
                            class="pl-10 pr-4 py-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        <i
                            class="ph-bold ph-magnifying-glass absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 dark:text-gray-500"></i>
                    </div>
                    <select id="segmentTypeFilter"
                        class="border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="">All Types</option>
                        <option value="dynamic">Dynamic</option>
                        <option value="static">Static</option>
                        <option value="behavioral">Behavioral</option>
                    </select>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50/50 dark:bg-gray-700/50 border-b border-gray-200 dark:border-gray-700">
                        <tr>
                            <th
                                class="px-6 py-4 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                                Segment Name</th>
                            <th
                                class="px-6 py-4 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                                Type</th>
                            <th
                                class="px-6 py-4 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                                Subscribers</th>
                            <th
                                class="px-6 py-4 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                                Last Updated</th>
                            <th
                                class="px-6 py-4 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                                Open Rate</th>
                            <th
                                class="px-6 py-4 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                                Actions</th>
                        </tr>
                    </thead>
                    <tbody id="segmentTableBody" class="divide-y divide-gray-100 dark:divide-gray-700">
                        <!-- Loaded via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Simplified Modal Structure (Placeholder for actual implementation) -->
    <!-- Ideally would be similar to Automations modal but with segment fields -->

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Mock Data matching existing static file
            let segments = [
                { name: "VIP Customers", type: "behavioral", subscribers: 324, lastUpdated: "2 hours ago", openRate: "45.2%" },
                { name: "New Subscribers (30 days)", type: "dynamic", subscribers: 456, lastUpdated: "1 day ago", openRate: "32.1%" },
                { name: "High Engagement", type: "behavioral", subscribers: 892, lastUpdated: "3 hours ago", openRate: "52.8%" },
                { name: "Cart Abandoners", type: "dynamic", subscribers: 267, lastUpdated: "6 hours ago", openRate: "28.9%" },
                { name: "Inactive Users (90+)", type: "static", subscribers: 1123, lastUpdated: "1 week ago", openRate: "12.4%" },
                { name: "Mobile-First Users", type: "behavioral", subscribers: 1678, lastUpdated: "4 hours ago", openRate: "38.7%" },
                { name: "Product Enthusiasts", type: "dynamic", subscribers: 543, lastUpdated: "2 days ago", openRate: "41.5%" },
                { name: "Gmail Users", type: "static", subscribers: 2341, lastUpdated: "1 hour ago", openRate: "29.8%" }
            ];

            let filteredSegments = [...segments];

            loadSegmentTable();

            document.getElementById('segmentSearch').addEventListener('input', filterSegments);
            document.getElementById('segmentTypeFilter').addEventListener('change', filterSegments);

            // Stub actions
            document.getElementById('createSegmentBtn').addEventListener('click', () => alert('Segment builder coming soon!'));
            document.getElementById('importSegmentBtn').addEventListener('click', () => alert('Import feature coming soon!'));

            function loadSegmentTable() {
                const tbody = document.getElementById('segmentTableBody');
                tbody.innerHTML = '';

                filteredSegments.forEach((segment, index) => {
                    const row = document.createElement('tr');
                    row.className = 'hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors';
                    row.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 bg-blue-50 dark:bg-blue-900/30 rounded-lg flex items-center justify-center text-blue-600 dark:text-blue-400">
                                    <i class="ph-bold ${segment.type === 'dynamic' ? 'ph-arrows-clockwise' : segment.type === 'static' ? 'ph-users' : 'ph-activity'}"></i>
                                </div>
                                <span class="text-gray-900 dark:text-white font-medium">${segment.name}</span>
                            </div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2.5 py-1 inline-flex text-xs leading-5 font-medium rounded-full 
                                ${segment.type === 'dynamic' ? 'bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-300' :
                            segment.type === 'static' ? 'bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300' :
                                'bg-purple-100 dark:bg-purple-900/30 text-purple-700 dark:text-purple-300'}">
                                ${segment.type}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600 dark:text-gray-300">
                            ${segment.subscribers.toLocaleString()}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400">
                            ${segment.lastUpdated}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900 dark:text-white font-medium">
                            ${segment.openRate}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <div class="flex gap-2">
                                <button class="p-1.5 text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">
                                    <i class="ph-bold ph-pencil-simple"></i>
                                </button>
                                <button class="p-1.5 text-gray-400 hover:text-red-600 dark:hover:text-red-400 transition-colors">
                                    <i class="ph-bold ph-trash"></i>
                                </button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            }

            function filterSegments() {
                const searchTerm = document.getElementById('segmentSearch').value.toLowerCase();
                const typeFilter = document.getElementById('segmentTypeFilter').value;

                filteredSegments = segments.filter(segment => {
                    const matchesSearch = segment.name.toLowerCase().includes(searchTerm);
                    const matchesType = !typeFilter || segment.type === typeFilter;
                    return matchesSearch && matchesType;
                });
                loadSegmentTable();
            }
        });
    </script>
</body>

</html>

<!-- Futuristic Author Management System -->
<div class="author-system-container h-full flex flex-col overflow-hidden relative">

    <!-- Background Elements -->
    <div class="absolute inset-0 pointer-events-none overflow-hidden">
        <div class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] bg-accent/5 rounded-full blur-[100px]"></div>
        <div class="absolute bottom-[-20%] right-[-10%] w-[50%] h-[50%] bg-secondary/5 rounded-full blur-[100px]"></div>
    </div>

    <!-- Header Section -->
    <header
        class="relative z-10 px-8 py-6 flex items-center justify-between border-b border-stroke-elements bg-base/80 backdrop-blur-md">
        <div class="flex items-center gap-4">
            <div
                class="w-12 h-12 rounded-xl bg-gradient-to-br from-accent to-secondary flex items-center justify-center shadow-lg shadow-accent/20">
                <i class="ph-bold ph-users-three text-2xl text-white"></i>
            </div>
            <div>
                <h1 class="text-2xl font-bold font-syne text-t-bright tracking-tight">Author Database</h1>
                <p class="text-sm text-t-muted font-mono">Manage identity profiles & credentials</p>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <div class="relative group">
                <input type="text" id="authorSearch" placeholder="Search operatives..."
                    class="pl-10 pr-4 py-2.5 bg-base-shade border border-stroke-controls rounded-lg text-sm text-t-bright focus:border-accent focus:ring-1 focus:ring-accent outline-none w-64 transition-all">
                <i
                    class="ph-bold ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-t-muted group-focus-within:text-accent transition-colors"></i>
            </div>

            <button onclick="openAuthorEditor()"
                class="flex items-center gap-2 px-5 py-2.5 bg-accent text-white rounded-lg font-bold text-sm tracking-wide hover:brightness-110 active:scale-95 transition-all shadow-lg shadow-accent/25 group">
                <i class="ph-bold ph-plus group-hover:rotate-90 transition-transform"></i>
                <span>NEW OPERATIVE</span>
            </button>
        </div>
    </header>

    <!-- Main Content Grid -->
    <main
        class="flex-1 overflow-y-auto p-8 relative z-10 scrollbar-thin scrollbar-thumb-stroke-elements scrollbar-track-transparent">
        <div id="authorsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Cards will be injected here -->
            <div class="col-span-full flex flex-col items-center justify-center py-20 text-t-muted opacity-50">
                <i class="ph-duotone ph-spinner-gap text-4xl animate-spin mb-4"></i>
                <p class="font-mono text-sm">Accessing Database...</p>
            </div>
        </div>
    </main>
</div>

<!-- Editor Modal Overlay -->
<div id="authorModal" class="fixed inset-0 z-[100] hidden">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-base/90 backdrop-blur-sm transition-opacity opacity-0" id="modalBackdrop"
        onclick="closeAuthorEditor()"></div>

    <!-- Modal Panel -->
    <div class="absolute right-0 top-0 bottom-0 w-full max-w-md bg-base border-l border-stroke-elements shadow-2xl transform translate-x-full transition-transform duration-300 flex flex-col"
        id="modalPanel">

        <!-- Modal Header -->
        <div class="px-6 py-5 border-b border-stroke-elements flex items-center justify-between bg-base-shade/50">
            <div>
                <h2 class="text-xl font-bold font-syne text-t-bright" id="modalTitle">New Operative</h2>
                <p class="text-xs text-t-muted font-mono uppercase tracking-wider">Identity Configuration</p>
            </div>
            <button onclick="closeAuthorEditor()"
                class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-base-tint text-t-muted hover:text-t-bright transition-colors">
                <i class="ph-bold ph-x"></i>
            </button>
        </div>

        <!-- Modal Form -->
        <div class="flex-1 overflow-y-auto p-6 space-y-6">
            <form id="authorForm" onsubmit="saveAuthor(event)">
                <input type="hidden" id="authorId">

                <!-- Avatar Upload Preview -->
                <div class="flex flex-col items-center gap-4 mb-8">
                    <div class="relative group w-32 h-32">
                        <div
                            class="absolute inset-0 bg-gradient-to-tr from-accent to-secondary rounded-full blur opacity-20 group-hover:opacity-40 transition-opacity">
                        </div>
                        <img id="avatarPreview" src="https://ui-avatars.com/api/?name=New+User&background=random"
                            class="w-full h-full rounded-full object-cover border-4 border-base-shade shadow-xl relative z-10 transition-transform group-hover:scale-105">

                        <div class="absolute bottom-0 right-0 z-20 bg-base border border-stroke-elements p-2 rounded-full shadow-lg group-hover:bg-accent group-hover:text-white transition-colors cursor-pointer"
                            title="Paste URL to change">
                            <i class="ph-bold ph-camera"></i>
                        </div>
                    </div>
                </div>

                <!-- Input Group -->
                <div class="space-y-4">
                    <div class="form-group">
                        <label class="text-xs font-bold text-t-muted uppercase tracking-wider mb-1.5 block">Full
                            Name</label>
                        <input type="text" id="authorName" required oninput="updatePreview()"
                            class="w-full px-4 py-3 bg-base-shade border border-stroke-controls rounded-lg text-t-bright focus:border-accent focus:ring-1 focus:ring-accent outline-none transition-all placeholder:text-t-placeholder/50">
                    </div>

                    <div class="form-group">
                        <label class="text-xs font-bold text-t-muted uppercase tracking-wider mb-1.5 block">Codename
                            (Username)</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-t-muted">@</span>
                            <input type="text" id="authorUsername" required
                                class="w-full pl-8 pr-4 py-3 bg-base-shade border border-stroke-controls rounded-lg text-t-bright focus:border-accent focus:ring-1 focus:ring-accent outline-none transition-all font-mono text-sm">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="text-xs font-bold text-t-muted uppercase tracking-wider mb-1.5 block">Bio
                            Data</label>
                        <textarea id="authorBio" rows="4"
                            class="w-full px-4 py-3 bg-base-shade border border-stroke-controls rounded-lg text-t-bright focus:border-accent focus:ring-1 focus:ring-accent outline-none transition-all resize-none"></textarea>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="form-group">
                            <label
                                class="text-xs font-bold text-t-muted uppercase tracking-wider mb-1.5 block">Images</label>
                            <input type="text" id="authorAvatar" placeholder="Avatar URL" onchange="updatePreview()"
                                class="w-full px-4 py-2 bg-base-shade border border-stroke-controls rounded-lg text-sm text-t-bright focus:border-accent outline-none">
                        </div>
                        <div class="form-group">
                            <label
                                class="text-xs font-bold text-t-muted uppercase tracking-wider mb-1.5 block">&nbsp;</label>
                            <input type="text" id="authorCover" placeholder="Cover URL"
                                class="w-full px-4 py-2 bg-base-shade border border-stroke-controls rounded-lg text-sm text-t-bright focus:border-accent outline-none">
                        </div>
                    </div>

                    <div class="form-group">
                        <label
                            class="text-xs font-bold text-t-muted uppercase tracking-wider mb-1.5 block">Specializations</label>
                        <input type="text" id="authorTags" placeholder="e.g. AI, Cybersec, Design"
                            class="w-full px-4 py-3 bg-base-shade border border-stroke-controls rounded-lg text-t-bright focus:border-accent outline-none transition-all">
                        <p class="text-[10px] text-t-muted mt-1 text-right">Comma separated values</p>
                    </div>
                </div>
            </form>
        </div>

        <!-- Modal Footer -->
        <div
            class="p-6 border-t border-stroke-elements bg-base-shade/30 flex justify-end gap-3 sticky bottom-0 backdrop-blur-md">
            <button type="button" onclick="closeAuthorEditor()"
                class="px-5 py-2.5 rounded-lg text-sm font-bold text-t-muted hover:text-t-bright hover:bg-base-tint transition-colors">
                Cancel
            </button>
            <button onclick="document.getElementById('authorForm').dispatchEvent(new Event('submit'))"
                class="px-6 py-2.5 bg-gradient-to-r from-accent to-secondary text-white rounded-lg text-sm font-bold shadow-lg shadow-accent/20 hover:shadow-accent/40 hover:-translate-y-0.5 transition-all">
                Save Profile
            </button>
        </div>
    </div>
</div>

<style>
    /* Custom Scrollbar */
    .scrollbar-thin::-webkit-scrollbar {
        width: 6px;
    }

    .scrollbar-thin::-webkit-scrollbar-track {
        background: transparent;
    }

    .scrollbar-thin::-webkit-scrollbar-thumb {
        background: var(--stroke-elements);
        border-radius: 6px;
    }

    .scrollbar-thin::-webkit-scrollbar-thumb:hover {
        background: var(--t-muted);
    }

    /* Card Hover Effects */
    .author-card {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .author-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.2);
    }

    .author-card::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1px;
        background: linear-gradient(135deg, var(--stroke-elements), transparent);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
    }

    .author-card:hover::before {
        background: linear-gradient(135deg, var(--accent), var(--secondary));
    }
</style>

<script>
    // State
    let authors = [];

    async function loadAuthors() {
        const grid = document.getElementById('authorsGrid');

        try {
            const res = await fetch('/admin/api/authors');
            if (!res.ok) throw new Error("Network response was not ok");
            authors = await res.json();
            renderAuthors();
        } catch (e) {
            console.error("Failed to load authors:", e);
            grid.innerHTML = `
                <div class="col-span-full flex flex-col items-center justify-center py-20 text-red-500">
                    <i class="ph-bold ph-warning-circle text-4xl mb-4"></i>
                    <p>Failed to retrieve operatives data.</p>
                </div>
            `;
        }
    }

    function renderAuthors() {
        const grid = document.getElementById('authorsGrid');
        const searchTerm = document.getElementById('authorSearch').value.toLowerCase();

        const filtered = authors.filter(a =>
            a.name.toLowerCase().includes(searchTerm) ||
            a.username.toLowerCase().includes(searchTerm)
        );

        if (filtered.length === 0) {
            grid.innerHTML = `
                <div class="col-span-full flex flex-col items-center justify-center py-20 text-t-muted text-center">
                    <i class="ph-duotone ph-ghost text-4xl mb-4 opacity-50"></i>
                    <p>No operatives match your search criteria.</p>
                </div>
            `;
            return;
        }

        grid.innerHTML = filtered.map(author => `
            <div class="author-card relative group bg-base border border-transparent rounded-2xl p-5 relative overflow-hidden">
                <!-- Hover Glow -->
                <div class="absolute inset-0 bg-accent/5 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>

                <!-- Header: Avatar + Status -->
                <div class="flex items-start justify-between mb-4 relative z-10">
                    <div class="relative">
                        <img src="${author.avatar_image || 'https://ui-avatars.com/api/?name=' + author.name}" 
                             class="w-16 h-16 rounded-full object-cover border-2 border-base shadow-md group-hover:border-accent transition-colors">
                        <div class="absolute -bottom-1 -right-1 w-5 h-5 bg-base rounded-full flex items-center justify-center">
                            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
                        </div>
                    </div>
                    <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity -translate-y-2 group-hover:translate-y-0 duration-300">
                        <button onclick="editAuthor(${author.id})" class="w-8 h-8 rounded-lg bg-base-shade text-t-muted hover:text-accent hover:bg-accent/10 flex items-center justify-center transition-colors">
                            <i class="ph-bold ph-pencil-simple"></i>
                        </button>
                        <a href="/author/${author.username}" target="_blank" class="w-8 h-8 rounded-lg bg-base-shade text-t-muted hover:text-accent hover:bg-accent/10 flex items-center justify-center transition-colors">
                            <i class="ph-bold ph-arrow-square-out"></i>
                        </a>
                    </div>
                </div>

                <!-- Content -->
                <div class="relative z-10">
                    <h3 class="font-syne font-bold text-lg text-t-bright group-hover:text-accent transition-colors truncate">${author.name}</h3>
                    <p class="font-mono text-xs text-t-muted mb-3">@${author.username}</p>
                    
                    <p class="text-sm text-t-medium line-clamp-2 mb-4 min-h-[2.5rem]">
                        ${author.bio || '<span class="italic opacity-50">No bio data available.</span>'}
                    </p>

                    <div class="flex flex-wrap gap-2">
                        ${(author.expert_tags || []).slice(0, 3).map(tag => `
                            <span class="px-2 py-1 rounded bg-base-shade text-[10px] uppercase font-bold text-t-muted tracking-wide border border-stroke-elements">
                                ${tag}
                            </span>
                        `).join('')}
                        ${(author.expert_tags || []).length > 3 ? `
                            <span class="px-2 py-1 rounded bg-base-shade text-[10px] text-t-muted border border-stroke-elements">+${(author.expert_tags?.length || 0) - 3}</span>
                        ` : ''}
                    </div>
                </div>
            </div>
        `).join('');
    }

    // Modal Logic
    const modal = document.getElementById('authorModal');
    const backdrop = document.getElementById('modalBackdrop');
    const panel = document.getElementById('modalPanel');

    function openAuthorEditor() {
        document.getElementById('authorForm').reset();
        document.getElementById('authorId').value = '';
        document.getElementById('avatarPreview').src = 'https://ui-avatars.com/api/?name=New+Operative&background=random';
        document.getElementById('modalTitle').textContent = 'New Operative';

        modal.classList.remove('hidden');
        // Animation
        requestAnimationFrame(() => {
            backdrop.classList.remove('opacity-0');
            panel.classList.remove('translate-x-full');
        });
    }

    function closeAuthorEditor() {
        backdrop.classList.add('opacity-0');
        panel.classList.add('translate-x-full');
        setTimeout(() => {
            modal.classList.add('hidden');
        }, 300);
    }

    function updatePreview() {
        const url = document.getElementById('authorAvatar').value;
        const name = document.getElementById('authorName').value || 'User';
        document.getElementById('avatarPreview').src = url || `https://ui-avatars.com/api/?name=${name}&background=random`;
    }

    async function editAuthor(id) {
        const author = authors.find(a => a.id === id);
        if (!author) return;

        openAuthorEditor();
        document.getElementById('modalTitle').textContent = 'Edit Operative';
        document.getElementById('authorId').value = author.id;
        document.getElementById('authorName').value = author.name;
        document.getElementById('authorUsername').value = author.username;
        document.getElementById('authorBio').value = author.bio || '';
        document.getElementById('authorAvatar').value = author.avatar_image || '';
        document.getElementById('authorCover').value = author.cover_image || '';
        document.getElementById('authorTags').value = (author.expert_tags || []).join(', ');

        updatePreview();
    }

    async function saveAuthor(e) {
        e.preventDefault();
        const id = document.getElementById('authorId').value;
        const data = {
            name: document.getElementById('authorName').value,
            username: document.getElementById('authorUsername').value,
            bio: document.getElementById('authorBio').value,
            avatar_image: document.getElementById('authorAvatar').value,
            cover_image: document.getElementById('authorCover').value,
            expert_tags: document.getElementById('authorTags').value.split(',').map(t => t.trim()).filter(t => t)
        };

        const method = id ? 'PUT' : 'POST';
        const url = id ? `/admin/api/authors/${id}` : '/admin/api/authors';

        try {
            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                closeAuthorEditor();
                loadAuthors(); // Refresh
                // Show toast?
            } else {
                const err = await res.json();
                alert("Error: " + (err.detail || err.message));
            }
        } catch (e) {
            console.error(e);
            alert("Network error");
        }
    }

    // Search Listeners
    document.getElementById('authorSearch').addEventListener('input', renderAuthors);

    // Initial Load
    document.addEventListener('DOMContentLoaded', loadAuthors);

    // Esc to close
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && !modal.classList.contains('hidden')) closeAuthorEditor();
    });
</script>

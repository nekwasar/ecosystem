                fontFamily: {
                    'syne': ['Syne', 'sans-serif'],
                },
                colors: {

                    'base-tint': 'var(--base-tint)',

                    'accent': 'var(--accent)',

                    'gradient-two': 'var(--gradient-two)',

<div
    class="min-h-screen bg-gradient-to-br from-gradient-one via-base to-gradient-two dark:from-base dark:via-base-tint dark:to-base-shade transition-all duration-medium">
    <div class="p-4 md:p-6 lg:p-12">
        <!-- Page Header -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl md:text-4xl font-bold font-syne text-t-bright">Products</h1>
                <p class="text-t-medium font-syne">Manage your store catalog</p>
            </div>
            <button onclick="openCreateModal()"
                class="px-6 py-3 bg-gradient-to-r from-accent to-secondary text-t-opp-bright font-bold rounded-xl shadow-lg hover:shadow-xl hover:scale-105 transition-all duration-medium flex items-center gap-2">
                <i class="ph-bold ph-plus"></i>
                <span>Add Product</span>
            </button>
        </div>

        <!-- Products Table Card -->
        <div
            class="bg-base/90 dark:bg-base-tint/90 backdrop-blur-xl border border-stroke-elements rounded-xl shadow-xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-stroke-elements bg-base-tint/50">
                            <th class="p-4 font-syne text-t-bright font-bold">Image</th>
                            <th class="p-4 font-syne text-t-bright font-bold">Name</th>
                            <th class="p-4 font-syne text-t-bright font-bold">Type</th>
                            <th class="p-4 font-syne text-t-bright font-bold">Price</th>
                            <th class="p-4 font-syne text-t-bright font-bold">Billing</th>
                            <th class="p-4 font-syne text-t-bright font-bold">Status</th>
                            <th class="p-4 font-syne text-t-bright font-bold text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="productsTableBody">
                        <!-- Rows will be injected here -->
                        <tr>
                            <td colspan="7" class="p-8 text-center text-t-muted">Loading products...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <!-- Pagination Control (Placeholder) -->
            <div class="p-4 border-t border-stroke-elements flex justify-end gap-2">
                <button onclick="loadProducts(0)"
                    class="px-4 py-2 border border-stroke-elements rounded-lg text-t-medium hover:bg-base-tint">Previous</button>
                <button onclick="loadProducts(0)"
                    class="px-4 py-2 border border-stroke-elements rounded-lg text-t-medium hover:bg-base-tint">Next</button>
            </div>
        </div>
    </div>
</div>

<!-- Create/Edit Modal -->
<div id="productModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
    <!-- Overlay -->
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeModal()"></div>

    <!-- Modal Content -->
    <div
        class="relative bg-base dark:bg-base-tint border border-stroke-elements rounded-2xl shadow-2xl w-full max-w-2xl max-h-[85vh] flex flex-col transform transition-all scale-100">
        <div
            class="p-6 border-b border-stroke-elements flex justify-between items-center bg-base dark:bg-base-tint z-10 rounded-t-2xl">
            <h2 id="modalTitle" class="text-2xl font-bold font-syne text-t-bright">Add New Product</h2>
            <button onclick="closeModal()" class="text-t-medium hover:text-accent">
                <i class="ph-bold ph-x text-xl"></i>
            </button>
        </div>

        <form id="productForm" onsubmit="handleSaveProduct(event)"
            class="p-6 space-y-6 overflow-y-auto custom-scrollbar">
            <!-- Hidden ID for Edit Mode -->
            <input type="hidden" name="product_id" id="productIdField">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Name -->
                <div class="space-y-2">
                    <label class="text-sm font-bold text-t-medium">Product Name</label>
                    <input type="text" name="name" required
                        class="w-full px-4 py-3 bg-base-tint/50 border border-stroke-elements rounded-xl text-t-bright focus:border-accent outline-none transition-all">
                </div>

                <!-- Slug -->
                <div class="space-y-2">
                    <label class="text-sm font-bold text-t-medium">Slug (URL)</label>
                    <input type="text" name="slug" required
                        class="w-full px-4 py-3 bg-base-tint/50 border border-stroke-elements rounded-xl text-t-bright focus:border-accent outline-none transition-all">
                </div>

                <!-- Price -->
                <div class="space-y-2">
                    <label class="text-sm font-bold text-t-medium">Price (USD)</label>
                    <input type="number" step="0.01" name="price" required
                        class="w-full px-4 py-3 bg-base-tint/50 border border-stroke-elements rounded-xl text-t-bright focus:border-accent outline-none transition-all">
                </div>

                <!-- SKU (Optional / Auto-Gen) -->
                <div class="space-y-2">
                    <label class="text-sm font-bold text-t-medium">SKU (Optional)</label>
                    <input type="text" name="sku" placeholder="Auto-generated if empty"
                        class="w-full px-4 py-3 bg-base-tint/50 border border-stroke-elements rounded-xl text-t-bright focus:border-accent outline-none transition-all">
                </div>

                <!-- Product Type -->
                <div class="space-y-2">
                    <label class="text-sm font-bold text-t-medium">Type</label>
                    <select name="product_type"
                        class="w-full px-4 py-3 bg-base-tint/50 border border-stroke-elements rounded-xl text-t-bright focus:border-accent outline-none transition-all">
                        <option value="digital_download">Digital Download</option>
                        <option value="license_key">License Key</option>
                        <option value="subscription">Subscription</option>
                        <option value="transfer_service">Transfer Service</option>
                    </select>
                </div>

                <!-- Billing Scheme -->
                <div class="space-y-2">
                    <label class="text-sm font-bold text-t-medium">Billing</label>
                    <select name="billing_scheme"
                        class="w-full px-4 py-3 bg-base-tint/50 border border-stroke-elements rounded-xl text-t-bright focus:border-accent outline-none transition-all">
                        <option value="one_time">One Time</option>
                        <option value="recurring">Recurring</option>
                    </select>
                </div>

                <!-- Cover Image URL -->
                <div class="space-y-2">
                    <label class="text-sm font-bold text-t-medium">Cover Image (URL)</label>
                    <input type="text" name="image_url" placeholder="https://..."
                        class="w-full px-4 py-3 bg-base-tint/50 border border-stroke-elements rounded-xl text-t-bright focus:border-accent outline-none transition-all">
                </div>

                <!-- Category -->
                <div class="space-y-2">
                    <label class="text-sm font-bold text-t-medium">Category</label>
                    <select id="categorySelect" name="category_select" onchange="toggleCustomCategory(this)"
                        class="w-full px-4 py-3 bg-base-tint/50 border border-stroke-elements rounded-xl text-t-bright focus:border-accent outline-none transition-all">
                        <!-- Populated via JS -->
                        <option value="other">Other (Type Custom)</option>
                    </select>
                    <!-- Custom Input (Hidden by default) -->
                    <input type="text" id="customCategoryInput" name="custom_category"
                        placeholder="Enter custom category..."
                        class="hidden w-full px-4 py-3 bg-base-tint/50 border border-stroke-elements rounded-xl text-t-bright focus:border-accent outline-none transition-all mt-2 animate-fade-in">
                </div>

                <!-- Version -->
                <div class="space-y-2">
                    <label class="text-sm font-bold text-t-medium">Version</label>
                    <input type="text" name="version" placeholder="e.g. v1.0"
                        class="w-full px-4 py-3 bg-base-tint/50 border border-stroke-elements rounded-xl text-t-bright focus:border-accent outline-none transition-all">
                </div>

                <!-- Preview URL -->
                <div class="space-y-2">
                    <label class="text-sm font-bold text-t-medium">Preview / Demo URL</label>
                    <input type="text" name="preview_url" placeholder="https://demo.nekwasar.com"
                        class="w-full px-4 py-3 bg-base-tint/50 border border-stroke-elements rounded-xl text-t-bright focus:border-accent outline-none transition-all">
                </div>
            </div>

            <!-- Tags -->
            <div class="space-y-2">
                <label class="text-sm font-bold text-t-medium">Tags (comma separated)</label>
                <input type="text" name="tags" placeholder="react, saas, dark-mode"
                    class="w-full px-4 py-3 bg-base-tint/50 border border-stroke-elements rounded-xl text-t-bright focus:border-accent outline-none transition-all">
            </div>

            <!-- Description -->
            <div class="space-y-2">
                <label class="text-sm font-bold text-t-medium">Description</label>
                <textarea name="description" rows="4"
                    class="w-full px-4 py-3 bg-base-tint/50 border border-stroke-elements rounded-xl text-t-bright focus:border-accent outline-none transition-all"></textarea>
            </div>

            <!-- Download URL or License logic placeholder -->
            <div class="space-y-2">
                <label class="text-sm font-bold text-t-medium">Download URL / File</label>
                <input type="text" name="download_url" placeholder="https://..."
                    class="w-full px-4 py-3 bg-base-tint/50 border border-stroke-elements rounded-xl text-t-bright focus:border-accent outline-none transition-all">
            </div>

            <div
                class="bg-base dark:bg-base-tint pt-4 border-t border-stroke-elements flex justify-end gap-4 sticky bottom-0 rounded-b-2xl">
                <button type="button" onclick="closeModal()"
                    class="px-6 py-2 text-t-medium font-bold hover:text-t-bright">Cancel</button>
                <button type="submit"
                    class="px-8 py-2 bg-accent text-white font-bold rounded-xl shadow-lg hover:bg-accent/90 transition-all">
                    Save Product
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    // --- Store Products Logic ---
    let STORE_CATEGORIES = [];
    let ALL_PRODUCTS = []; // Cache to avoid refetch on Edit click

    window.initStoreProducts = function () {
        console.log('🚀 Init Store Products Triggered');
        loadCategories();
        loadProducts();
    }

    async function loadCategories() {
        try {
            const token = localStorage.getItem('token');
            const res = await fetch('/api/admin/store/categories', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                STORE_CATEGORIES = await res.json();
                populateCategorySelect();
            }
        } catch (e) {
            console.error("Failed to load categories", e);
        }
    }

    function populateCategorySelect(selectedId = null) {
        const select = document.getElementById('categorySelect');
        // Keep 'other' at the bottom
        let html = STORE_CATEGORIES.map(c =>
            `<option value="${c.name}" ${c.id === selectedId ? 'selected' : ''}>${c.name}</option>`
        ).join('');
        html += `<option value="other">Other (Type Custom)</option>`;
        select.innerHTML = html;

        // Reset custom input logic
        toggleCustomCategory(select);
    }

    async function loadProducts() {
        const tableBody = document.getElementById('productsTableBody');
        try {
            const token = localStorage.getItem('token');
            const res = await fetch('/api/admin/store/products?limit=50', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();

            if (!res.ok) throw new Error(data.detail || 'Failed to fetch products');

            ALL_PRODUCTS = data;
            renderTable(data);
        } catch (e) {
            console.error(e);
            tableBody.innerHTML = `
                <tr><td colspan="7" class="p-8 text-center text-red-500">Error loading products: ${e.message}</td></tr>
            `;
        }
    }

    function renderTable(products) {
        const tableBody = document.getElementById('productsTableBody');
        if (products.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="7" class="p-8 text-center text-t-muted">No products found. Add one to get started!</td></tr>`;
            return;
        }

        tableBody.innerHTML = products.map(p => `
            <tr class="border-b border-stroke-elements hover:bg-base-tint/30 transition-colors">
                <td class="p-4">
                    <div class="w-12 h-12 bg-base-tint rounded-lg overflow-hidden border border-stroke-elements">
                        ${p.images && p.images.length > 0
                ? `<img src="${p.images[0].file_url}" class="w-full h-full object-cover">`
                : `<div class="w-full h-full flex items-center justify-center text-t-muted"><i class="ph-bold ph-image"></i></div>`
            }
                    </div>
                </td>
                <td class="p-4">
                    <div class="font-bold text-t-bright">${p.name}</div>
                    <div class="text-xs text-t-muted">${p.sku || 'No SKU'}</div>
                </td>
                <td class="p-4 text-t-medium capitalise">${p.category ? p.category.name : '-'}</td>
                <td class="p-4 font-bold text-t-bright">$${Number(p.price).toFixed(2)}</td>
                <td class="p-4 text-t-medium capitalise">${p.billing_scheme?.replace('_', ' ') || '-'}</td>
                <td class="p-4">
                    <span class="px-2 py-1 rounded-full text-xs font-bold ${p.is_active ? 'bg-green-500/10 text-green-500' : 'bg-red-500/10 text-red-500'}">
                        ${p.is_active ? 'Active' : 'Inactive'}
                    </span>
                </td>
                <td class="p-4 text-right">
                    <button class="p-2 text-t-medium hover:text-accent transition-colors" title="Edit" onclick="openEditModal(${p.id})">
                        <i class="ph-bold ph-pencil-simple"></i>
                    </button>
                    <button class="p-2 text-t-medium hover:text-red-500 transition-colors" title="Delete" onclick="deleteProduct(${p.id})">
                        <i class="ph-bold ph-trash"></i>
                    </button>
                </td>
            </tr>
        `).join('');
    }

    // Modal Logic
    function openCreateModal() {
        document.getElementById('productModal').classList.remove('hidden');
        document.getElementById('modalTitle').innerText = 'Add New Product';
        document.getElementById('productForm').reset();
        document.getElementById('productIdField').value = ''; // Clear ID -> Create Mode
        populateCategorySelect(); // Reset drop
    }

    function openEditModal(productId) {
        const product = ALL_PRODUCTS.find(p => p.id === productId);
        if (!product) return alert('Product not found in cache');

        document.getElementById('productModal').classList.remove('hidden');
        document.getElementById('modalTitle').innerText = 'Edit Product';

        const form = document.getElementById('productForm');
        form.reset();

        // Fill fields
        document.getElementById('productIdField').value = product.id;
        form.name.value = product.name;
        form.slug.value = product.slug;
        form.price.value = product.price;
        form.sku.value = product.sku || '';
        form.product_type.value = product.product_type;
        form.billing_scheme.value = product.billing_scheme;
        form.description.value = product.description || '';
        form.download_url.value = product.download_url || '';
        form.version.value = product.version || '';
        form.preview_url.value = product.preview_url || '';

        // Handle Category
        if (product.category) {
            // Need ID matching if possible, but names are safer for 'select' elements if values are unique
            // My populate uses names as values currently
            const options = document.getElementById('categorySelect').options;
            for (let i = 0; i < options.length; i++) {
                if (options[i].text === product.category.name) {
                    document.getElementById('categorySelect').selectedIndex = i;
                    break;
                }
            }
        }

        // Tags
        if (product.tags) {
            form.tags.value = product.tags.join(', ');
        }
    }

    function closeModal() {
        document.getElementById('productModal').classList.add('hidden');
        document.getElementById('productForm').reset();
        document.getElementById('customCategoryInput').classList.add('hidden');
    }

    function toggleCustomCategory(select) {
        const input = document.getElementById('customCategoryInput');
        if (select.value === 'other') {
            input.classList.remove('hidden');
            input.required = true;
        } else {
            input.classList.add('hidden');
            input.required = false;
        }
    }

    async function handleSaveProduct(e) {
        e.preventDefault();
        const formData = new FormData(e.target);

        // Logic for Category (Select vs Custom)
        let categoryName = formData.get('category_select');
        if (categoryName === 'other') {
            categoryName = formData.get('custom_category');
        }

        // Logic for Tags
        const tagsRaw = formData.get('tags') || "";
        const tagsArray = tagsRaw.split(',').map(t => t.trim()).filter(t => t);

        const productId = formData.get('product_id'); // Hidden field
        const isEdit = productId && productId !== '';

        const payload = {
            name: formData.get('name'),
            slug: formData.get('slug'),
            sku: formData.get('sku'),
            description: formData.get('description'),
            price: parseFloat(formData.get('price')),
            product_type: formData.get('product_type'),
            billing_scheme: formData.get('billing_scheme'),
            download_url: formData.get('download_url') || null,
            // New Fields
            version: formData.get('version'),
            preview_url: formData.get('preview_url'),
            tags: tagsArray,
            _category_name: categoryName,

            stock_quantity: -1
        };

        // Only include optional bools if they matter, usually defaults are fine.
        if (!isEdit) {
            payload.is_active = true;
            payload.is_private_listing = false;
        }

        try {
            const token = localStorage.getItem('token');
            const url = isEdit ? `/api/admin/store/products/${productId}` : '/api/admin/store/products';
            const method = isEdit ? 'PUT' : 'POST';

            const res = await fetch(url, {
                method: method,
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });
            const data = await res.json();

            if (!res.ok) throw new Error(data.detail || 'Failed to save');

            // Handle Image Upload separate from Edit/Create for simplicity here
            // If new image url provided:
            const prodId = isEdit ? productId : data.id;
            const imgUrl = formData.get('image_url');

            if (imgUrl && imgUrl.trim() !== '') {
                await fetch(`/api/admin/store/products/${prodId}/media`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        file_url: imgUrl,
                        media_type: 'image',
                        is_hero: true
                    })
                });
            }

            // Success
            alert(isEdit ? 'Product Updated!' : 'Product Created!');
            closeModal();
            loadProducts(); // Refresh table
        } catch (error) {
            console.error(error);
            alert('Error: ' + error.message);
        }
    }

    async function deleteProduct(id) {
        if (!confirm('Are you sure you want to delete this product?')) return;

        try {
            const token = localStorage.getItem('token');
            const res = await fetch(`/api/admin/store/products/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (!res.ok) throw new Error('Failed to delete');
            loadProducts();
        } catch (e) {
            alert(e.message);
        }
    }
</script>

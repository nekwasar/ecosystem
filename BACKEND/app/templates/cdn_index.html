<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NekwasaR.CDN | Global Asset Hub</title>

    <!-- Reuse Portfolio CSS -->
    <link rel="stylesheet" href="https://nekwasar.com/css/loaders/loader.css">
    <link rel="stylesheet" href="https://nekwasar.com/css/plugins.css">
    <link rel="stylesheet" href="https://nekwasar.com/css/main.css"> <!-- Contains Colors/Dark Mode -->

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Theme Colors -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#dcdce7">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#111111">

    <style>
        /* Custom tweaks for CDN landing specific layout */
        .cdn-hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .cdn-content {
            max-width: 800px;
            padding: 2rem;
        }

        .headline__title {
            font-size: 4rem;
            /* Match portfolio big text */
            margin-bottom: 1.5rem;
        }

        .btn-group-custom {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 2rem;
        }

        /* Force hide loader after load */
        .loaded #loader {
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease-in-out;
        }
    </style>
</head>

<body>

    <!-- Loader -->
    <div id="loader" class="loader">
        <div id="loaderContent" class="loader__content">
            <div class="loader__shadow"></div>
            <div class="loader__box"></div>
        </div>
    </div>

    <!-- Background -->
    <div id="imageBackground" class="image-background" data-speed="0.4"></div>

    <!-- Header Controls (Theme Switcher) -->
    <div class="header__controls d-flex justify-content-end"
        style="position: absolute; top: 20px; right: 20px; z-index: 100;">
        <button id="color-switcher" class="color-switcher header__switcher btn" type="button" role="switch"
            aria-label="light/dark mode" aria-checked="true"></button>
    </div>

    <!-- Hero Content -->
    <section class="cdn-hero">
        <div class="cdn-content animate-headline">
            <!-- Logo / Icon -->
            <div
                style="font-family: 'Orbitron', sans-serif; font-size: 1.2rem; color: var(--accent); margin-bottom: 2rem; display: flex; align-items: center; justify-content: center; gap: 10px;">
                <i class="ph-fill ph-lightning" style="font-size: 2rem;"></i>
                <span>NEKWASAR.CDN</span>
            </div>

            <h1 class="headline__title">Global Asset<br><span style="color: var(--accent);">Distribution.</span></h1>

            <p class="headline__subtitle" style="max-width: 600px; margin: 0 auto;">
                High-performance content delivery for the NekwasaR ecosystem. Serving static assets, media, and secure
                downloads globally.
            </p>

            <div class="btn-group-custom">
                <a class="btn btn-default btn-hover btn-hover-accent" href="https://nekwasar.com">
                    <span class="btn-caption">Visit Portfolio</span>
                    <i class="ph-bold ph-user"></i>
                </a>
                <a class="btn btn-default btn-hover btn-hover-accent" href="https://store.nekwasar.com">
                    <span class="btn-caption">Explore Store</span>
                    <i class="ph-bold ph-storefront"></i>
                </a>
                <a class="btn btn-default btn-hover btn-hover-accent" href="https://blog.nekwasar.com">
                    <span class="btn-caption">Explore Blog</span>
                    <i class="ph-bold ph-article"></i>
                </a>
            </div>

            <!-- Stats (Optional decoration using portfolio style) -->
            <div style="margin-top: 4rem; display: flex; gap: 2rem; justify-content: center; opacity: 0.7;">
                <div>
                    <div style="font-family: 'Orbitron'; font-weight: bold; font-size: 1.5rem;">99.9%</div>
                    <div style="font-size: 0.8rem; text-transform: uppercase;">Uptime</div>
                </div>
                <div>
                    <div style="font-family: 'Orbitron'; font-weight: bold; font-size: 1.5rem;">Global</div>
                    <div style="font-size: 0.8rem; text-transform: uppercase;">Reach</div>
                </div>
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script src="https://nekwasar.com/js/libs.min.js"></script>
    <script src="https://nekwasar.com/js/app.js"></script> <!-- Handles Loader & Theme Switch -->
    <script>
        // Force remove loader fallback
        window.addEventListener('load', () => {
            document.body.classList.add('loaded');
            const loader = document.getElementById('loader');
            if (loader) loader.classList.add('loaded');
        });
    </script>
</body>

</html>

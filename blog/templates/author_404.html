{% extends "base_blog.html" %}

{% block title %}Author Not Found - {{ post_data.title|default('Blog') }}{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex flex-col items-center justify-center relative overflow-hidden">
    <!-- Background Effects -->
    <div class="absolute inset-0 pointer-events-none">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-red-500/10 rounded-full blur-[128px] animate-pulse"></div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-orange-500/10 rounded-full blur-[128px] animate-pulse"
            style="animation-delay: 1s;"></div>
    </div>

    <div class="relative z-10 text-center px-6 max-w-2xl mx-auto">
        <!-- Icon -->
        <div class="mb-8 relative inline-block">
            <div
                class="w-24 h-24 rounded-2xl bg-surface-1 border border-red-500/30 flex items-center justify-center relative overflow-hidden group">
                <i class="ph-duotone ph-user-focus text-5xl text-red-500 relative z-10"></i>

                <!-- Glitch Scanline -->
                <div
                    class="absolute inset-0 bg-red-500/10 translate-y-full group-hover:translate-y-0 transition-transform duration-300">
                </div>
            </div>
            <!-- Decorative dots -->
            <div
                class="absolute -top-2 -right-2 w-4 h-4 rounded-full border border-red-500/50 flex items-center justify-center">
                <div class="w-1.5 h-1.5 bg-red-500 rounded-full animate-ping"></div>
            </div>
        </div>

        <!-- Text -->
        <h1 class="text-4xl md:text-5xl font-bold font-syne mb-6 tracking-tight">
            Who is <span class="text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-500">@{{ username
                }}</span>?
        </h1>

        <p class="text-xl text-t-muted mb-8 font-mono leading-relaxed">
            Username not found amongst our authors..<br>
            <span class="text-t-bright text-sm opacity-70">Are you sure you got the right name?</span>
        </p>

        <!-- Search Bar -->
        <div
            class="bg-surface-1 border border-stroke-secondary rounded-xl p-2 flex items-center shadow-lg shadow-black/5 max-w-md mx-auto mb-8 transition-colors focus-within:border-accent">
            <i class="ph-bold ph-magnifying-glass text-t-muted ml-3 text-lg"></i>
            <input type="text" placeholder="Search for the right person..."
                class="bg-transparent border-none outline-none w-full px-4 text-t-bright placeholder:text-t-placeholder font-mono text-sm"
                onkeydown="if(event.key === 'Enter') window.location.href = '/search?q=' + this.value">
        </div>

        <!-- Actions -->
        <div class="flex flex-wrap gap-4 justify-center">
            <a href="/"
                class="px-6 py-3 rounded-xl bg-surface-1 border border-stroke-secondary text-t-bright font-bold text-sm hover:border-accent hover:text-accent transition-all flex items-center gap-2">
                <i class="ph-bold ph-house"></i>
                Home
            </a>
            <a href="/blog"
                class="px-6 py-3 rounded-xl bg-white text-black font-bold text-sm hover:bg-gray-200 transition-colors flex items-center gap-2 shadow-lg shadow-white/10">
                <i class="ph-bold ph-article"></i>
                All Articles
            </a>
        </div>
    </div>
</div>
{% endblock %}

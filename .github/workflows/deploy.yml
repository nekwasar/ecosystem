name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          cd BACKEND/app
          pip install -r requirements.txt
      - name: Run tests
        run: |
          cd BACKEND/app
          python -m pytest || echo "No tests found"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            PROJECT_DIR="asabak" 
            cd ~/$PROJECT_DIR

            # Pull latest changes (Make sure your VPS can authenticate with Git)
            git fetch origin
            git reset --hard origin/main

            # Deploy with Docker Compose
            docker-compose down
            docker-compose up -d --build

            # Clean up old/unused images to prevent disk from filling up
            docker image prune -f

            # Restart nginx (optional, but good if your config changed)
            sudo systemctl restart nginx
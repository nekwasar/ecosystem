version: '3.8'

services:
  admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecosystem_admin
    restart: always
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://ecosystem:password@postgres:5432/admin_db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - SECRET_KEY=${SECRET_KEY}
      - PORT=8001
    depends_on:
      - postgres
      - redis
    networks:
      - ecosystem_network

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ecosystem
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecosystem_network

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - ecosystem_network

networks:
  ecosystem_network:
    driver: bridge

volumes:
  postgres_data:

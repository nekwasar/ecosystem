<!-- Tailwind Configuration Script -->
<script>
    tailwind.config = {
        darkMode: 'class',
        theme: {
            extend: {
                fontFamily: {
                    'syne': ['Syne', 'sans-serif'],
                },
                colors: {
                    'base': 'var(--base)',
                    'base-tint': 'var(--base-tint)',
                    'base-shade': 'var(--base-shade)',
                    'accent': 'var(--accent)',
                    'secondary': 'var(--secondary)',
                    't-bright': 'var(--t-bright)',
                    't-medium': 'var(--t-medium)',
                    't-muted': 'var(--t-muted)',
                    't-opp-bright': 'var(--t-opp-bright)',
                    'stroke-elements': 'var(--stroke-elements)',
                    'gradient-one': 'var(--gradient-one)',
                    'gradient-two': 'var(--gradient-two)',
                }
            }
        }
    }
</script>

<div
    class="min-h-screen bg-gradient-to-br from-gradient-one via-base to-gradient-two dark:from-base dark:via-base-tint dark:to-base-shade transition-all duration-medium">
    <div class="p-4 md:p-6 lg:p-12">
        <!-- Page Header -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl md:text-4xl font-bold font-syne text-t-bright">Orders</h1>
                <p class="text-t-medium font-syne">Manage customer purchases and fulfillment</p>
            </div>
            <button onclick="loadOrders()"
                class="px-6 py-3 bg-base-tint border border-stroke-elements text-t-bright font-bold rounded-xl shadow-lg hover:bg-base-shade transition-all duration-medium flex items-center gap-2">
                <i class="ph-bold ph-arrows-clockwise"></i>
                <span>Refresh</span>
            </button>
        </div>

        <!-- Orders Table Card -->
        <div
            class="bg-base/90 dark:bg-base-tint/90 backdrop-blur-xl border border-stroke-elements rounded-xl shadow-xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-stroke-elements bg-base-tint/50">
                            <th class="p-4 font-syne text-t-bright font-bold">Order #</th>
                            <th class="p-4 font-syne text-t-bright font-bold">Customer</th>
                            <th class="p-4 font-syne text-t-bright font-bold">Total</th>
                            <th class="p-4 font-syne text-t-bright font-bold">Status</th>
                            <th class="p-4 font-syne text-t-bright font-bold">Payment</th>
                            <th class="p-4 font-syne text-t-bright font-bold">Date</th>
                            <th class="p-4 font-syne text-t-bright font-bold text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody">
                        <!-- Rows will be injected here -->
                        <tr>
                            <td colspan="7" class="p-8 text-center text-t-muted">Loading orders...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Order Details/Edit Modal -->
<div id="orderModal" class="fixed inset-0 z-50 hidden">
    <!-- Overlay -->
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeModal()"></div>

    <!-- Modal Content -->
    <div class="absolute inset-0 flex items-center justify-center p-4">
        <div
            class="bg-base dark:bg-base-tint border border-stroke-elements rounded-2xl shadow-2xl w-full max-w-2xl transform transition-all scale-100 flex flex-col max-h-[90vh]">
            <div class="p-6 border-b border-stroke-elements flex justify-between items-center bg-base-tint/50">
                <h2 class="text-2xl font-bold font-syne text-t-bright">Order Details</h2>
                <button onclick="closeModal()" class="text-t-medium hover:text-accent">
                    <i class="ph-bold ph-x text-xl"></i>
                </button>
            </div>

            <div class="p-6 overflow-y-auto space-y-8">
                <!-- ID Hidden -->
                <input type="hidden" id="editOrderId">

                <!-- Info Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <p class="text-sm font-bold text-t-muted uppercase tracking-wider mb-1">Order Number</p>
                        <p id="detailOrderNumber" class="text-xl font-bold text-t-bright font-syne">ORD-...</p>
                    </div>
                    <div>
                        <p class="text-sm font-bold text-t-muted uppercase tracking-wider mb-1">Customer</p>
                        <p id="detailCustomer" class="text-lg text-t-bright">...</p>
                    </div>
                    <div>
                        <p class="text-sm font-bold text-t-muted uppercase tracking-wider mb-1">Total</p>
                        <p id="detailTotal" class="text-lg font-bold text-accent">...</p>
                    </div>
                    <div>
                        <p class="text-sm font-bold text-t-muted uppercase tracking-wider mb-1">Date</p>
                        <p id="detailDate" class="text-lg text-t-medium">...</p>
                    </div>
                </div>

                <!-- Update Status Form -->
                <form id="updateOrderForm" onsubmit="handleUpdateOrder(event)"
                    class="bg-base/50 p-6 rounded-xl border border-stroke-elements space-y-4">
                    <h3 class="font-bold text-t-bright font-syne">Update Status</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-t-medium">Order Status</label>
                            <select name="status" id="editStatus"
                                class="w-full px-4 py-3 bg-base-tint/50 border border-stroke-elements rounded-xl text-t-bright focus:border-accent outline-none">
                                <option value="pending_payment">Pending Payment</option>
                                <option value="processing">Processing</option>
                                <option value="completed">Completed</option>
                                <option value="cancelled">Cancelled</option>
                                <option value="transfer_pending">Transfer Pending</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-t-medium">Payment Status</label>
                            <select name="payment_status" id="editPaymentStatus"
                                class="w-full px-4 py-3 bg-base-tint/50 border border-stroke-elements rounded-xl text-t-bright focus:border-accent outline-none">
                                <option value="unpaid">Unpaid</option>
                                <option value="paid">Paid</option>
                                <option value="failed">Failed</option>
                                <option value="refunded">Refunded</option>
                            </select>
                        </div>
                    </div>
                    <div class="flex justify-end pt-2">
                        <button type="submit"
                            class="px-6 py-2 bg-accent text-white font-bold rounded-xl shadow-lg hover:bg-accent/90 transition-all">
                            Update Order
                        </button>
                    </div>
                </form>

                <!-- Order Items -->
                <div>
                    <h3 class="font-bold text-t-bright font-syne mb-4 border-b border-stroke-elements pb-2">Items</h3>
                    <div id="orderItemsList" class="space-y-3">
                        <!-- Injected items -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    window.initStoreOrders = function () {
        console.log('🚀 Init Store Orders Triggered');
        loadOrders();
    }

    var allOrders = allOrders || [];

    async function loadOrders() {
        const tableBody = document.getElementById('ordersTableBody');
        tableBody.innerHTML = `<tr><td colspan="7" class="p-8 text-center text-t-muted animate-pulse">Refreshing orders...</td></tr>`;

        try {
            const token = localStorage.getItem('token');
            const res = await fetch('/api/admin/store/orders', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            allOrders = data;

            if (!res.ok) throw new Error(data.detail || 'Failed to fetch orders');

            if (data.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="7" class="p-8 text-center text-t-muted">No orders found.</td></tr>`;
                return;
            }

            tableBody.innerHTML = data.map(o => {
                const badgeColor = getStatusColor(o.status);
                const payColor = o.payment_status === 'paid' ? 'text-green-500' : 'text-red-500';

                return `
                <tr class="border-b border-stroke-elements hover:bg-base-tint/30 transition-colors">
                    <td class="p-4 font-bold text-t-bright font-syne">${o.order_number || '#' + o.id}</td>
                    <td class="p-4 text-t-medium">${o.guest_email || 'User ' + o.user_id}</td>
                    <td class="p-4 font-bold text-t-bright">${formatCurrency(o.total_amount, o.currency)}</td>
                    <td class="p-4"><span class="px-3 py-1 rounded-full text-xs font-bold ${badgeColor}">${formatStatus(o.status)}</span></td>
                    <td class="p-4 font-bold ${payColor} uppercase text-xs">${o.payment_status || '-'}</td>
                    <td class="p-4 text-t-muted text-sm">${new Date(o.created_at).toLocaleDateString()}</td>
                    <td class="p-4 text-right">
                        <button onclick="openOrderModal(${o.id})" class="px-4 py-2 bg-base-tint border border-stroke-elements rounded-lg text-t-medium hover:text-accent hover:border-accent transition-all">
                            Details
                        </button>
                    </td>
                </tr>
            `}).join('');

        } catch (e) {
            console.error(e);
            tableBody.innerHTML = `<tr><td colspan="7" class="p-8 text-center text-red-500">Error: ${e.message}</td></tr>`;
        }
    }

    function openOrderModal(id) {
        const order = allOrders.find(o => o.id === id);
        if (!order) return;

        // Populate info
        document.getElementById('editOrderId').value = order.id;
        document.getElementById('detailOrderNumber').textContent = order.order_number || '#' + order.id;
        document.getElementById('detailCustomer').textContent = order.guest_email || 'User ID: ' + order.user_id;
        document.getElementById('detailTotal').textContent = formatCurrency(order.total_amount, order.currency);
        document.getElementById('detailDate').textContent = new Date(order.created_at).toLocaleString();

        // Populate form
        document.getElementById('editStatus').value = order.status;
        document.getElementById('editPaymentStatus').value = order.payment_status || 'unpaid';

        // Populate Items
        const itemsList = document.getElementById('orderItemsList');
        if (order.items && order.items.length > 0) {
            itemsList.innerHTML = order.items.map(item => `
                <div class="flex justify-between items-center bg-base-tint/30 p-4 rounded-xl border border-stroke-elements">
                    <div>
                        <p class="font-bold text-t-bright">${item.product_name}</p>
                        <p class="text-xs text-t-muted">SKU: ${item.sku || 'N/A'}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-t-bright">${item.quantity} x ${formatCurrency(item.unit_price, order.currency)}</p>
                    </div>
                </div>
            `).join('');
        } else {
            itemsList.innerHTML = `<p class="text-t-muted italic">No items data available.</p>`;
        }

        document.getElementById('orderModal').classList.remove('hidden');
    }

    function closeModal() {
        document.getElementById('orderModal').classList.add('hidden');
    }

    async function handleUpdateOrder(e) {
        e.preventDefault();
        const id = document.getElementById('editOrderId').value;
        const formData = new FormData(e.target);
        const payload = Object.fromEntries(formData.entries());

        try {
            const token = localStorage.getItem('token');
            const res = await fetch(`/api/admin/store/orders/${id}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            if (!res.ok) throw new Error('Failed to update order');

            alert('Order Updated Successfully');
            closeModal();
            loadOrders();
        } catch (error) {
            alert(error.message);
        }
    }

    // Helpers
    function formatCurrency(amount, currency) {
        return new Intl.NumberFormat('en-US', { style: 'currency', currency: currency || 'USD' }).format(amount);
    }

    function formatStatus(status) {
        return status.split('_').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
    }

    function getStatusColor(status) {
        switch (status) {
            case 'completed': return 'bg-green-500/20 text-green-500';
            case 'processing': return 'bg-blue-500/20 text-blue-500';
            case 'cancelled': return 'bg-red-500/20 text-red-500';
            case 'pending_payment': return 'bg-yellow-500/20 text-yellow-500';
            default: return 'bg-gray-500/20 text-gray-500';
        }
    }
</script>

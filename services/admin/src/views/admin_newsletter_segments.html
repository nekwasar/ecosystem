<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter Segments</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script>
        // Check for dark mode preference
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
    <style>
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .dark ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
    </style>
</head>

<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white antialiased transition-colors duration-200">
    <div class="min-h-screen p-6">
        <!-- Header -->
        <div class="mb-8 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-2">Segments</h1>
                <p class="text-gray-600 dark:text-gray-400">Advanced audience segmentation and targeting</p>
            </div>
            <div class="flex gap-4">
                <button onclick="openCreateModal()"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg flex items-center gap-2 font-medium transition-colors shadow-sm">
                    <i class="ph-bold ph-plus"></i> Create Segment
                </button>
            </div>
        </div>

        <!-- Segment Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-100 dark:border-gray-700 p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 dark:text-gray-400 text-sm">Total Segments</p>
                        <p class="text-2xl font-bold text-gray-900 dark:text-white" id="statTotalSegments">0</p>
                    </div>
                    <div class="p-3 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-lg">
                        <i class="ph-bold ph-users text-2xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-100 dark:border-gray-700 p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 dark:text-gray-400 text-sm">Avg. Segment Size</p>
                        <p class="text-2xl font-bold text-gray-900 dark:text-white" id="statAvgSize">0</p>
                    </div>
                    <div class="p-3 bg-purple-50 dark:bg-purple-900/30 text-purple-600 dark:text-purple-400 rounded-lg">
                        <i class="ph-bold ph-chart-pie text-2xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-100 dark:border-gray-700 p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 dark:text-gray-400 text-sm">Most Popular</p>
                        <p class="text-xl font-bold text-gray-900 dark:text-white" id="statPopular">-</p>
                    </div>
                    <div class="p-3 bg-green-50 dark:bg-green-900/30 text-green-600 dark:text-green-400 rounded-lg">
                        <i class="ph-bold ph-star text-2xl"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Active Segments Table -->
        <div
            class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden">
            <div
                class="p-6 border-b border-gray-100 dark:border-gray-700 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <h3 class="text-lg font-bold text-gray-900 dark:text-white">Active Segments</h3>
                <div class="flex gap-4">
                    <div class="relative">
                        <input type="text" id="segmentSearch" placeholder="Search"
                            class="pl-10 pr-4 py-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        <i
                            class="ph-bold ph-magnifying-glass absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 dark:text-gray-500"></i>
                    </div>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50/50 dark:bg-gray-700/50 border-b border-gray-200 dark:border-gray-700">
                        <tr>
                            <th
                                class="px-6 py-4 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                                Segment Name</th>
                            <th
                                class="px-6 py-4 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                                Type</th>
                            <th
                                class="px-6 py-4 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                                Est. Subscribers</th>
                            <th
                                class="px-6 py-4 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                                Created</th>
                            <th
                                class="px-6 py-4 text-right text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                                Actions</th>
                        </tr>
                    </thead>
                    <tbody id="segmentTableBody" class="divide-y divide-gray-100 dark:divide-gray-700">
                        <tr>
                            <td colspan="5" class="text-center py-8 text-gray-500">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Create Modal -->
    <dialog id="createModal"
        class="bg-transparent p-0 w-full max-w-lg backdrop:bg-black/50 backdrop:backdrop-blur-sm z-50">
        <div
            class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl border border-gray-200 dark:border-gray-700 overflow-hidden mx-auto mt-20">
            <div
                class="p-6 border-b border-gray-100 dark:border-gray-700 flex justify-between items-center bg-gray-50 dark:bg-gray-700">
                <h3 class="text-lg font-bold text-gray-900 dark:text-white">Create Segment</h3>
                <button onclick="closeCreateModal()"
                    class="p-2 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-lg text-gray-500 dark:text-gray-400 transition-colors">
                    <i class="ph-bold ph-x"></i>
                </button>
            </div>
            <form id="createForm" onsubmit="handleCreate(event)" class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Segment Name</label>
                    <input type="text" name="name" required
                        class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none"
                        placeholder="e.g. VIP Users">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Criteria
                        Template</label>
                    <select id="criteriaTemplate" onchange="updateCriteria(this.value)"
                        class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="all">All Active Subscribers</option>
                        <option value="recent">Recent Subscribers (30 Days)</option>
                        <option value="inactive">Inactive (No opens 90 Days)</option>
                        <option value="high_engagement">High Engagement (5+ Opens)</option>
                        <option value="no_engagement">No Engagement (0 Opens)</option>
                        <option value="verified">Verified Emails Only</option>
                        <option value="gmail">Gmail Users</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Description</label>
                    <textarea name="description" rows="3"
                        class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                </div>

                <div class="pt-4 flex justify-end gap-3">
                    <button type="button" onclick="closeCreateModal()"
                        class="px-4 py-2 rounded-lg font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">Cancel</button>
                    <button type="submit"
                        class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-medium transition-colors shadow-md">Save
                        Segment</button>
                </div>
            </form>
        </div>
    </dialog>

    <script>
        let segments = [];
        const modal = document.getElementById('createModal');

        // Robust initialization
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            // Document already ready (navigation case)
            init();
        }

        // Add Search Listener
        document.getElementById('segmentSearch').addEventListener('input', (e) => {
            render(e.target.value.toLowerCase());
        });

        async function init() {
            try {
                const tbody = document.getElementById('segmentTableBody');
                // Show loading state if empty
                if (tbody.children.length === 0 || tbody.innerText.includes('Loading')) {
                    tbody.innerHTML = `<tr><td colspan="5" class="text-center py-8 text-gray-500"><i class="ph-duotone ph-spinner-gap animate-spin text-2xl mb-2 text-blue-600"></i><p>Loading segments...</p></td></tr>`;
                }

                const res = await fetch('/api/newsletter/admin/segments', {
                    headers: {
                        'Cache-Control': 'no-cache',
                        'Authorization': `Bearer ${localStorage.getItem('token') || ''}`
                    }
                });
                const data = await res.json();
                if (data.success) {
                    segments = data.segments || [];
                    render();
                }
            } catch (e) {
                console.error(e);
                document.getElementById('segmentTableBody').innerHTML = `<tr><td colspan="5" class="text-center py-8 text-red-500">Failed to load segments</td></tr>`;
            }
        }

        function render(filterTerm = '') {
            const tbody = document.getElementById('segmentTableBody');
            tbody.innerHTML = '';

            // Filter segments
            const displaySegments = segments.filter(seg =>
                seg.name.toLowerCase().includes(filterTerm) ||
                (seg.type && seg.type.toLowerCase().includes(filterTerm))
            );

            // Calculate global stats (always based on full list)
            let totalSubscribers = 0;
            let popularName = '-';
            let maxSubscribers = -1;

            segments.forEach(seg => {
                totalSubscribers += (seg.cached_count || 0);
                if (seg.cached_count > maxSubscribers) {
                    maxSubscribers = seg.cached_count;
                    popularName = seg.name;
                }
            });
            document.getElementById('statTotalSegments').innerText = segments.length;
            document.getElementById('statAvgSize').innerText = segments.length ? Math.round(totalSubscribers / segments.length) : 0;
            document.getElementById('statPopular').innerText = popularName;

            // Render Empty State
            if (displaySegments.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center py-8 text-gray-500">No segments found.</td></tr>`;
                return;
            }

            // Render Rows
            displaySegments.forEach(seg => {
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 bg-blue-50 dark:bg-blue-900/30 rounded-lg flex items-center justify-center text-blue-600 dark:text-blue-400">
                                    <i class="ph-bold ph-users"></i>
                                </div>
                                <span class="text-gray-900 dark:text-white font-medium">${seg.name}</span>
                            </div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2.5 py-1 inline-flex text-xs leading-5 font-medium rounded-full bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300">
                                ${seg.type}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600 dark:text-gray-300">
                            ${(seg.cached_count || 0).toLocaleString()}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400">
                            ${new Date(seg.created_at).toLocaleDateString()}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <button onclick="deleteSegment(${seg.id})" class="p-1.5 text-gray-400 hover:text-red-600 dark:hover:text-red-400 transition-colors">
                                <i class="ph-bold ph-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        function openCreateModal() {
            modal.showModal();
            modal.classList.add('flex');
        }

        function closeCreateModal() {
            modal.close();
            document.getElementById('createForm').reset();
        }

        let currentCriteria = { "type": "all" }; // Default

        function updateCriteria(val) {
            if (val === 'all') currentCriteria = { "type": "all" };
            else if (val === 'recent') currentCriteria = { "field": "created_at", "op": "gt", "value": "30_days_ago" };
            else if (val === 'inactive') currentCriteria = { "field": "last_open", "op": "gt", "value": "90_days_ago" };
            else if (val === 'high_engagement') currentCriteria = { "field": "open_count", "op": "gte", "value": 5 };
            else if (val === 'no_engagement') currentCriteria = { "field": "open_count", "op": "eq", "value": 0 };
            else if (val === 'verified') currentCriteria = { "field": "is_confirmed", "op": "eq", "value": true };
            else if (val === 'gmail') currentCriteria = { "field": "email", "op": "contains", "value": "gmail.com" };
        }

        async function handleCreate(e) {
            e.preventDefault();
            const fd = new FormData(e.target);
            const payload = {
                name: fd.get('name'),
                description: fd.get('description'),
                type: 'dynamic', // Defaulting to dynamic
                criteria: currentCriteria
            };

            try {
                const res = await fetch('/api/newsletter/admin/segments', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token') || ''}`
                    },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.success) {
                    closeCreateModal();
                    init();
                } else {
                    alert('Error: ' + data.detail);
                }
            } catch (err) { console.error(err); alert('Failed to create'); }
        }

        async function deleteSegment(id) {
            if (!confirm('Delete segment?')) return;
            try {
                const res = await fetch(`/api/newsletter/admin/segments/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token') || ''}` }
                });
                const data = await res.json();
                if (data.success) init();
            } catch (e) { console.error(e); }
        }
    </script>
</body>

</html>

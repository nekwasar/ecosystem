<div
    class="min-h-screen bg-gradient-to-br from-gradient-one via-base to-gradient-two dark:from-base dark:via-base-tint dark:to-base-shade transition-all duration-medium">
    <div class="p-4 md:p-6 lg:p-12">
        <!-- Page Header -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl md:text-4xl font-bold font-syne text-t-bright">Discounts</h1>
                <p class="text-t-medium font-syne">Manage coupons and promotional codes</p>
            </div>
            <button onclick="document.getElementById('createModal').classList.remove('hidden')"
                class="px-6 py-3 bg-accent text-white font-bold rounded-xl shadow-lg hover:bg-accent/90 transition-all duration-medium flex items-center gap-2">
                <i class="ph-bold ph-plus"></i>
                <span>New Discount</span>
            </button>
        </div>

        <!-- Discounts Table Card -->
        <div
            class="bg-base/90 dark:bg-base-tint/90 backdrop-blur-xl border border-stroke-elements rounded-xl shadow-xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-stroke-elements bg-base-tint/50">
                            <th class="p-4 font-syne text-t-bright font-bold">Code</th>
                            <th class="p-4 font-syne text-t-bright font-bold">Value</th>
                            <th class="p-4 font-syne text-t-bright font-bold">Type</th>
                            <th class="p-4 font-syne text-t-bright font-bold">Usage</th>
                            <th class="p-4 font-syne text-t-bright font-bold">Expires</th>
                            <th class="p-4 font-syne text-t-bright font-bold">Status</th>
                            <th class="p-4 font-syne text-t-bright font-bold text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="discountsTableBody">
                        <!-- Rows will be injected here -->
                        <tr>
                            <td colspan="7" class="p-8 text-center text-t-muted">Loading discounts...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Create Discount Modal -->
<div id="createModal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeModal()"></div>
    <div class="absolute inset-0 flex items-center justify-center p-4">
        <div
            class="bg-base dark:bg-base-tint border border-stroke-elements rounded-2xl shadow-2xl w-full max-w-lg transform transition-all scale-100 flex flex-col max-h-[90vh]">
            <div class="p-6 border-b border-stroke-elements flex justify-between items-center bg-base-tint/50">
                <h2 class="text-2xl font-bold font-syne text-t-bright">New Discount</h2>
                <button onclick="closeModal()" class="text-t-medium hover:text-accent">
                    <i class="ph-bold ph-x text-xl"></i>
                </button>
            </div>
            <form onsubmit="handleCreateDiscount(event)" class="p-6 space-y-6 overflow-y-auto">
                <div>
                    <label class="block text-sm font-bold text-t-medium mb-1">Code</label>
                    <input type="text" name="code" required placeholder="e.g. SUMMER2025"
                        style="text-transform:uppercase"
                        class="w-full px-4 py-3 bg-base-tint/50 border border-stroke-elements rounded-xl text-t-bright focus:border-accent outline-none font-bold tracking-wider">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-t-medium mb-1">Type</label>
                        <select name="discount_type"
                            class="w-full px-4 py-3 bg-base-tint/50 border border-stroke-elements rounded-xl text-t-bright focus:border-accent outline-none">
                            <option value="percentage">Percentage (%)</option>
                            <option value="fixed_amount">Fixed Amount ($)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-t-medium mb-1">Value</label>
                        <input type="number" step="0.01" name="value" required placeholder="10"
                            class="w-full px-4 py-3 bg-base-tint/50 border border-stroke-elements rounded-xl text-t-bright focus:border-accent outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-t-medium mb-1">Usage Limit (Optional)</label>
                    <input type="number" name="max_uses" placeholder="Default: Unlimited"
                        class="w-full px-4 py-3 bg-base-tint/50 border border-stroke-elements rounded-xl text-t-bright focus:border-accent outline-none">
                </div>

                <div>
                    <label class="block text-sm font-bold text-t-medium mb-1">End Date (Optional)</label>
                    <input type="date" name="end_date"
                        class="w-full px-4 py-3 bg-base-tint/50 border border-stroke-elements rounded-xl text-t-bright focus:border-accent outline-none">
                </div>

                <div class="flex justify-end pt-4">
                    <button type="submit"
                        class="px-8 py-3 bg-accent text-white font-bold rounded-xl shadow-lg hover:bg-accent/90 transition-all transform hover:scale-105">
                        Create Discount
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    window.initStoreDiscounts = function () {
        console.log('🚀 Init Store Discounts Triggered');
        loadDiscounts();
    }

    function closeModal() {
        document.getElementById('createModal').classList.add('hidden');
    }

    async function loadDiscounts() {
        const tableBody = document.getElementById('discountsTableBody');
        tableBody.innerHTML = `<tr><td colspan="7" class="p-8 text-center text-t-muted animate-pulse">Refreshing discounts...</td></tr>`;

        try {
            const token = localStorage.getItem('token');
            const res = await fetch('/api/admin/store/discounts', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();

            if (!res.ok) throw new Error(data.detail || 'Failed to fetch discounts');

            if (data.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="7" class="p-8 text-center text-t-muted">No discounts found. Click "New Discount" to create one.</td></tr>`;
                return;
            }

            tableBody.innerHTML = data.map(d => {
                const isPercentage = d.discount_type === 'percentage';
                const formattedValue = isPercentage ? `${d.value}%` : `$${d.value}`;
                const isActive = d.is_active;

                return `
                <tr class="border-b border-stroke-elements hover:bg-base-tint/30 transition-colors">
                    <td class="p-4 font-bold text-t-bright font-mono text-lg tracking-wide">${d.code}</td>
                    <td class="p-4 font-bold text-accent">${formattedValue}</td>
                    <td class="p-4 text-t-medium text-sm capitalize">${d.discount_type.replace('_', ' ')}</td>
                    <td class="p-4 text-t-medium text-sm">
                        ${d.used_count} / ${d.max_uses || '∞'}
                    </td>
                    <td class="p-4 text-t-muted text-sm">${d.end_date ? new Date(d.end_date).toLocaleDateString() : 'Never'}</td>
                    <td class="p-4">
                        ${isActive
                        ? '<span class="px-3 py-1 bg-green-500/20 text-green-500 rounded-full text-xs font-bold">Active</span>'
                        : '<span class="px-3 py-1 bg-gray-500/20 text-gray-500 rounded-full text-xs">Inactive</span>'}
                    </td>
                    <td class="p-4 text-right">
                        <button onclick="deleteDiscount(${d.id})" class="text-xs text-red-500 hover:text-red-400 hover:underline">Delete</button>
                    </td>
                </tr>
            `}).join('');

        } catch (e) {
            console.error(e);
            tableBody.innerHTML = `<tr><td colspan="7" class="p-8 text-center text-red-500">Error: ${e.message}</td></tr>`;
        }
    }

    async function handleCreateDiscount(e) {
        e.preventDefault();
        const formData = new FormData(e.target);
        const payload = Object.fromEntries(formData.entries());

        // Clean up empty optional fields
        if (!payload.max_uses) delete payload.max_uses;
        if (!payload.end_date) delete payload.end_date;

        try {
            const token = localStorage.getItem('token');
            const res = await fetch('/api/admin/store/discounts', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.detail || 'Failed to create discount');
            }

            closeModal();
            e.target.reset();
            loadDiscounts();
            // Optional: Success Toast here

        } catch (error) {
            alert(error.message);
        }
    }

    async function deleteDiscount(id) {
        if (!confirm("Are you sure you want to delete this discount code? Cannot be undone.")) return;

        try {
            const token = localStorage.getItem('token');
            const res = await fetch(`/api/admin/store/discounts/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (!res.ok) throw new Error("Failed to delete");
            loadDiscounts();
        } catch (e) {
            alert(e.message);
        }
    }
</script>

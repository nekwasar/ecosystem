                },

                    'gradient-one': 'var(--gradient-one)',
                    'gradient-two': 'var(--gradient-two)',
                }

</script>

<div
    class="min-h-screen bg-gradient-to-br from-gradient-one via-base to-gradient-two dark:from-base dark:via-base-tint dark:to-base-shade transition-all duration-medium">
    <div class="p-4 md:p-6 lg:p-12">
        <!-- Page Header -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl md:text-4xl font-bold font-syne text-t-bright">Inventory</h1>
                <p class="text-t-medium font-syne">Manage stock levels and availability</p>
            </div>
            <button onclick="loadInventory()"
                class="px-6 py-3 bg-base-tint border border-stroke-elements text-t-bright font-bold rounded-xl shadow-lg hover:bg-base-shade transition-all duration-medium flex items-center gap-2">
                <i class="ph-bold ph-arrows-clockwise"></i>
                <span>Refresh</span>
            </button>
        </div>

        <!-- Inventory Table Card -->
        <div
            class="bg-base/90 dark:bg-base-tint/90 backdrop-blur-xl border border-stroke-elements rounded-xl shadow-xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-stroke-elements bg-base-tint/50">
                            <th class="p-4 font-syne text-t-bright font-bold">Product</th>
                            <th class="p-4 font-syne text-t-bright font-bold">SKU</th>
                            <th class="p-4 font-syne text-t-bright font-bold">Type</th>
                            <th class="p-4 font-syne text-t-bright font-bold">Current Stock</th>
                            <th class="p-4 font-syne text-t-bright font-bold">Status</th>
                            <th class="p-4 font-syne text-t-bright font-bold text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTableBody">
                        <!-- Rows will be injected here -->
                        <tr>
                            <td colspan="6" class="p-8 text-center text-t-muted">Loading inventory...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    window.initStoreInventory = function () {
        console.log('🚀 Init Store Inventory Triggered');
        loadInventory();
    }

    var allProducts = allProducts || [];

    async function loadInventory() {
        const tableBody = document.getElementById('inventoryTableBody');
        tableBody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-t-muted animate-pulse">Refreshing data...</td></tr>`;

        try {
            const token = localStorage.getItem('token');
            const res = await fetch('/api/admin/store/products?limit=200', { // Fetch all products
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            allProducts = data;

            if (!res.ok) throw new Error(data.detail || 'Failed to fetch inventory');

            if (data.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-t-muted">No products found.</td></tr>`;
                return;
            }

            tableBody.innerHTML = data.map(p => {
                const isUnlimited = p.stock_quantity === -1;
                const isLow = !isUnlimited && p.stock_quantity < 10;

                return `
                <tr class="border-b border-stroke-elements hover:bg-base-tint/30 transition-colors">
                    <td class="p-4 font-bold text-t-bright">${p.name}</td>
                    <td class="p-4 text-t-medium text-sm font-mono">${p.sku || '-'}</td>
                    <td class="p-4 text-t-muted text-sm capitalize">${p.product_type?.replace('_', ' ')}</td>
                    <td class="p-4">
                        <div class="flex items-center gap-2">
                             <input type="number" 
                                value="${p.stock_quantity}" 
                                min="-1"
                                class="w-24 px-3 py-1 bg-base border border-stroke-elements rounded-lg text-t-bright text-center focus:border-accent outline-none"
                                onchange="updateStock(${p.id}, this.value)"
                            >
                            ${isUnlimited ? '<span class="text-xs text-t-muted">(Unlimited)</span>' : ''}
                        </div>
                    </td>
                    <td class="p-4">
                        ${isLow
                        ? '<span class="px-3 py-1 bg-red-500/20 text-red-500 rounded-full text-xs font-bold animate-pulse">Low Stock</span>'
                        : '<span class="px-3 py-1 bg-green-500/20 text-green-500 rounded-full text-xs">In Stock</span>'}
                    </td>
                    <td class="p-4 text-right">
                         <button onclick="updateStock(${p.id}, -1)" class="text-xs text-accent hover:underline">Set Unlimited</button>
                    </td>
                </tr>
            `}).join('');

        } catch (e) {
            console.error(e);
            tableBody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-red-500">Error: ${e.message}</td></tr>`;
        }
    }

    async function updateStock(id, newQuantity) {
        try {
            const token = localStorage.getItem('token');
            const res = await fetch(`/api/admin/store/products/${id}/inventory`, {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ stock_quantity: parseInt(newQuantity) })
            });

            if (!res.ok) throw new Error('Failed to update stock');

            // Show toast or subtle success (optional)
            // For now, reload to reflect status changes (Low Stock -> In Stock)
            loadInventory();

        } catch (error) {
            alert('Error updating stock: ' + error.message);
        }
    }
</script>

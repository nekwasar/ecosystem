name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'gigs/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: |
          cd gigs
          npm install
          npm run build
      - run: |
          docker build -t nekwasar-gigs:${{ github.sha }} gigs
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker stop ecosystem_gigs || true
            docker rm ecosystem_gigs || true
            docker run -d --name ecosystem_gigs --network ecosystem_network -p 3000:3000 nekwasar-gigs:${{ github.sha }}

version: '3.8'
services:
  gigs:
    build:
      context: ../gigs
      dockerfile: Dockerfile
    container_name: ecosystem_gigs
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://ecosystem:password@postgres:5432/gigs_db}
      - NODE_ENV=production
    networks:
      - ecosystem_network

networks:
  ecosystem_network:
    driver: bridge

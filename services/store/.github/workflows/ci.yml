name: CI

on:
  push:
    branches: [main]
    paths:
      - 'services/store/**'
  pull_request:
    branches: [main]
    paths:
      - 'services/store/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: |
          cd services/store
          pip install -r requirements.txt
      - run: |
          cd services/store
          pytest || true

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Backend Upstream
    upstream backend_api {
        server 127.0.0.1:8000;
    }

    # Common Proxy Headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 1. Main Portfolio (Static) - SERVED DIRECTLY FROM NGINX
    server {
        listen 80;
        server_name nekwasar.com www.nekwasar.com;
        
        # Static Root (assuming user home is /home/moltuser)
        root /home/moltuser/asabak/portfolio;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }

        # Cache static assets aggressively
        location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2)$ {
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }
    }

    # 2. Subdomains (Dynamic Backend)
    server {
        listen 80;
        server_name blog.nekwasar.com store.nekwasar.com api.nekwasar.com cdn.nekwasar.com;

        location / {
            proxy_pass http://backend_api;
        }

        # Media uploads (proxied to backend volume mount or alias)
        # Assuming backend runs in Docker and mounts uploads to host
        location /uploads/ {
            alias /home/moltuser/asabak/BACKEND/uploads/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }
    }

    # 3. O4A Innovations (Static Site)
    server {
        listen 80;
        server_name o4ainnovations.com www.o4ainnovations.com;
        
        root /home/moltuser/asabak/o4ainnovations/public;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }
    }
}

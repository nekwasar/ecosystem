version: '3.8'

services:
  # Infrastructure
  postgres:
    image: postgres:15-alpine
    container_name: ecosystem_postgres
    restart: always
    environment:
      POSTGRES_USER: ecosystem
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ecosystem
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecosystem_network
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: ecosystem_redis
    restart: always
    networks:
      - ecosystem_network
    ports:
      - "6379:6379"

  nginx:
    image: nginx:alpine
    container_name: ecosystem_nginx
    restart: always
    volumes:
      - ./infrastructure/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - ecosystem_network
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - admin
      - blog
      - store
      - portfolio
      - agent
      - cdn

  # Services
  admin:
    build: ./services/admin
    container_name: ecosystem_admin
    restart: always
    environment:
      - DATABASE_URL=postgresql://ecosystem:password@postgres:5432/admin_db
    networks:
      - ecosystem_network
    ports:
      - "8001:8001"
    depends_on:
      - postgres

  blog:
    build: ./services/blog
    container_name: ecosystem_blog
    restart: always
    environment:
      - DATABASE_URL=postgresql://ecosystem:password@postgres:5432/blog_db
    networks:
      - ecosystem_network
    ports:
      - "8003:8003"
    depends_on:
      - postgres

  store:
    build: ./services/store
    container_name: ecosystem_store
    restart: always
    environment:
      - DATABASE_URL=postgresql://ecosystem:password@postgres:5432/store_db
    networks:
      - ecosystem_network
    ports:
      - "8004:8004"
    depends_on:
      - postgres

  portfolio:
    build: ./services/portfolio
    container_name: ecosystem_portfolio
    restart: always
    networks:
      - ecosystem_network
    ports:
      - "80:80"

  agent:
    build: ./services/agent
    container_name: ecosystem_agent
    restart: always
    environment:
      - DATABASE_URL=postgresql://ecosystem:password@postgres:5432/agent_db
    networks:
      - ecosystem_network
    ports:
      - "8002:8002"
    depends_on:
      - postgres



  cdn:
    build: ./services/cdn
    container_name: ecosystem_cdn
    restart: always
    environment:
      - BUNNY_API_KEY=${BUNNY_API_KEY}
      - BUNNY_STORAGE_ZONE=${BUNNY_STORAGE_ZONE}
      - CDN_BASE_URL=${CDN_BASE_URL:-https://cdn.nekwasar.com}
    networks:
      - ecosystem_network
    ports:
      - "8006:8006"

  gigs:
    build: ./gigs
    container_name: ecosystem_gigs
    restart: always
    environment:
      - DATABASE_URL=postgresql://ecosystem:password@postgres:5432/gigs_db
    networks:
      - ecosystem_network
    ports:
      - "3000:3000"
    depends_on:
      - postgres

networks:
  ecosystem_network:
    driver: bridge

volumes:
  postgres_data:
